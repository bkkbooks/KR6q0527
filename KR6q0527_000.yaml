front:
  text: 剩人和尚像未言先契未舉先知掉得便行頂天立地且道是阿誰就是這個頑皮兒我當時囑付汝緊收拾直入千峰萬峰去汝不依吾言惹出許多葛藤雖然卻因風吹火希慈雲兮灑甘露咦看來一味信前緣留與三韓作鼻祖空隱老人題法姪玄釋書剩人和尚語録序山延袤一線斗絶千里流人言四方之風在焉然於佛事特勝剩公逾歲余亦放至陰數椽屋沙氣為嵐雪雲或晨或夕時一相遇頻死之餘尚載敝簏書一車意為僵臥遺奠之具剩公方韜光剷采每來輒抓搔典籍獨提宗教栩栩相視也間煮薥粥調鹽薺或擊稿木佐以瓦缶唱酬吟詠一室之外遂無知者閲二年而剩公之教大行住普濟成語録緇宿輩已西傳長安既而三韓遠近及門愈衆指授開演復成茲編夫佛理顯密圓通不可涯涘公嘗言佛教人倫也余與公同遭原鴿之痛而一在事前一在事後公唯以忠孝激烈之性沉涵于性海故沖融浩蕩澄湛無際班史氏所謂五星日月其根在地而形見于天者也嘗演法于接引永安諸剎令海州屠人咸釋刀去遼陽鬥者至相戒勿令公知此亦大道感應之驗矣昔韓昌黎與大顛雖三書珍重留衣作別紀其相見寥寥數語余被譴出塞甚于潮澥而獨得與剩公永其朝夕白塵交橫海風漂泊一燈炯然後之覽者亦可以讀其書而論其世也夫順治甲午季春十日北里樵人謹書剩人和尚語録序豫幼而頑劣長不知學隨俗汩沒章句而已被謫以來惶惑失志文字之外無可憑者從縶維中得普濟剩和尚語録一函讀而恍有醒焉及見如故師亦以豫為若可與語者而朝夕訓誨之豫實愧不能行也茲者座下緇俗復刻師法語廣示學人較之前録尤為詳備弘深高遠豫烏能測然豫嘗見師之為人而知師不徒言也師持身高峻壁立萬仞而與物甚親談笑藹如冥心象始寂爾忘言而風雲月露刻畫殆盡早年離俗塵緣悉捐而語及罔極之恩兄弟友朋之誼未嘗不感激流涕悽惻纏綿而不能自已也聞人一善終身不忘急人之難痛若膚剝豈非其實有諸己故言之親切而不厭而人之信從者愈久而愈著耶將見師斯録一出當與古之尊宿如慈明大慧者並垂天壤庶幾有特立超詣之士聞風興起以傳持斯道于無窮豫之窾陋又安能窺其所至哉大清順治甲午仲春上浣木齊謹序重梓千山和尚語録序剩人和尚說法醫巫閭七坐道場全提直指絶塞罕聞一時緇白稱佛出世有普濟録刊行已三十餘載緣道里迢遙邊關間阻齊魯燕趙亦鮮覯止矧大江以南於是粵東得度弟子僧顯又公謀於同社集諸因緣重梓於穗城黃華寺用廣流通其仰體普度之懷足稱真切屬辨序於篇首以誼忝猶子其何容辭惜未親承提命烏足以管窺蠡測向侍先師天老人時得聞師天姿英邁悟門超越而血性淋漓不拘小節與客雄談快論則目無古今時或慷慨高歌又心悲物類凡情聖見脫落無餘等閒提唱太煞婆心隨地隨人不辭明破惟偈頌高古乃暢達本懷當時徒默識之及今披閲追憶先語始悉愍物弘慈恩大難酬也有謂宗門提唱剿絶情識不落筌蹄應如趙州純以本分事接人此說未盡然也佛道普攝號無緣慈巨細淺深均應嘉與猶泰山不輕毫末始成其高河海不擇細流方成其大故曰如來即慈慈即如來何則一切衆生已成佛竟已說法竟已度生竟已涅槃竟其妙蔑以加矣還堪以本分事接引否若有接引不名本分不假接引本分誰名三乘十二分說權說實說半說滿無非曲為今時即最後拈花頭陀微笑以及一千七百亦早帶水拖泥古德常云我若一向舉揚宗乘法堂前草深一丈倩人看院始得旨哉言乎雖然亦未盡然也治生産業與實相不違細語粗言皆歸第一義放行把住權在當人世上良醫隨拈一草皆可療病奚必芐朮參菧若徒尚諸剿絶滅跡潛蹤以為極則翻成頇顢醍醐毒藥賺誤尤多是知隨宜說法為三世如來法施之式非師識度恢弘慈愍深摰何足以與於斯至若生平行實詳於二塔銘中初則天老人撰於粵之雷峰時庚子夏杪次為大中丞雪海郝公所撰猶古之第二碑也然辨更聞於其徒尸林曰師示寂後某捧碑銘再出關閲三載啓龕入塔挺然端坐舉體赤色忽兩淚交流四衆驚疑皆以生不得入關門為恨豈知師之悲天愍人滿腔熱淚海湧湫傾窮未來際無有盡極悲夫悲夫時康熙庚午歲僧自恣日法姪今辨稽首謹述剩人和尚語録目録卷之一上堂卷之二上堂卷之三小參卷之四小參卷之五普說茶話問答卷之六拈古頌古偈十二時歌書請啓元旦喇嘛潦藏葛浪耶舍葛浪索勒葛浪僧録司掌印行深遼陽僧綱寬道藏主慧達廣慈監院玄賦接引監院祖遠慈航監院寂亮大寧監院師慧永安監院祖道等稽首和南竊以末後拈花遂付正法眼藏西來渡葦方知直指心傳六代相承二支並演棒喝交馳于中土針錘未及于遐方白足親臨晉代久矣空聞法眼流入朝鮮杳然絶響豈本性果分南北繇大事實待因緣恭惟剩和尚座下冰雪肝腸人天眼目生盧老之鄉豈堪作佛蹈丹霞之跡不肯選官裂世網之千重經洪爐之百鍊洵華首之真子而壽昌之曾孫何意長邊偏縈夙願乘白馬以出關不啻騰蘭初入僭金繩而作聘直疑洪杲重來七斤破衲何妨呼馬呼牛一片婆心未免入泥入水持身不染度世有方松枝再握已看頑石點頭劍影未彰早見天魔落膽喜大荒之漸闢祈甘雨以弘施一燈輝煌于雪窖夫豈異人五葉燦爛于冰天端在斯日白骨青燐無復愁風愁雨狐神鼠聖庶幾革面革心既來九譯以瞻雲敬率千群而立雪思深龍象慶溢蟲沙謹疏順治九年三月朔日
