body:
  text: 門徒比丘今廬今又重梓小參小參云古人道說得一丈不如行得一尺說得一尺不如行得一寸諸佛諸祖出世只教你行得便是並不曾要爾會說會道於今末法時代只貴空談但有行得一分底便勝那說得十丈百丈底山僧昔在俗時便知有此事雖不敢妄比張運使李駙馬一流也可作得個中等善友為甚決定出家祗為看見佛門中說得底人太多果能通得一經一論不消說才趠得些子一味向人前賣弄便是行腳衲子也只顧嘴頭子滑腳跟下全然不肯照管山僧無奈把受之父母上好頭髮剃了只圖與佛祖出一口氣及乎來到者邊見爾者邊人心實祗是無人開闢山僧暗祝韋馱道佛法不滅全是你底干係山僧若是當死便休放在者裏有甚用處不料邇年承諸知識強逼出頭山僧雖即力量不加不敢承當心中實是喜之不勝眼見得座下人人大丈夫都是代佛祖出得氣底漢子山僧恨不得剖出心膽為爾只要爾一步跳在山僧頭上不見道知過於師方堪傳授知與師齊減師半德諸善知識第一莫圖口說昔大慧在湛堂門下會說會道千伶百俐若在今日出頭來誰人抵得他只是湛堂不肯一日喚云杲上座叫你說禪你會說叫爾拈古你會拈叫你頌古你會頌只是缺者一著子你若缺者一著子叫你進來方丈說禪時有禪出了方丈即沒交涉惺惺思量時有禪睡著時即沒交涉似者般如何抵敵生死大慧不覺垂淚道正是某甲難處諸善知識你但自己勘驗一切時中隨緣遇境打得過去便是不可說得行不得則佛法無靈驗也久立珍重住大寧寺小參師云山僧者裡佛法不同諸處佛法諸處佛法只愛多恨不得將佛祖經書裝在肚裏逢人便說是為通達佛法山僧者裡偏不喜好縱饒爾三藏十二部一口氣講得出一千七百則一線串過到山僧者裡半點也用不著何故祗為你捨本而逐末何謂末佛是末祖是末一切經書總是末你若一切拚不得終日馳求終世馳求求至窮劫落得一空不如現前拚得一念無求即是山僧記得粵西一個儒者道拚得豪傑做得聖賢拚得聖賢做得神仙拚得神仙做得佛祖拚得佛祖做得豪傑山僧卻不恁麼道拚得豪傑做得豪傑拚得聖賢做得聖賢拚得神仙做得神仙拚得佛祖做得佛祖不見百丈道佛是無求人求之即乖理是無求理求之即失你若著無求即同有求若著無為即同有為所以經言不取於法不取非法不取非非法初祖云心如墻壁方可入道三祖云兀爾忘緣六祖云善惡都莫思量山僧今日奉勸諸善知識只是把平日要求佛要求祖要求出生死證涅槃一切念頭放在一邊只提起本參話頭與他撕捱將去日久月深驀地如桶底脫相似方知山僧不汝欺也天寒久立珍重合會善人請小參舉金剛經云凡所有相皆是虛妄只如殿上底是佛相前面底是韋馱相兩邊底是天王相即今座上說法底是說法相大衆拱立出家底是僧相在家底是居士相老底老相少底少相且道是虛妄不是虛妄若道是虛妄則諸佛不必出世祖師不必西來即今大寧也不必結制衆善也不必設供何故總一虛妄若道不是虛妄則諸佛未出世時是個甚麼祖師未西來時是個甚麼即前日大寧未曾結制衆善未曾設供時是個甚麼祗因者裡透不過所以在會底必定家裡立一尊相爐中燒一炷香項上掛一串珠方才喚作修行便有那一種必定不肯立相必定不肯燒香必定不肯掛珠底喚作不著相修行殊不知著相底固然不是那怕著相底早已著相了也若見諸相非相又著個甚麼山僧於今也不教你認者虛妄之相也不教你捨此虛妄之相別尋個真實之相祗要你各人當下審察現今在者裡聽法聞法底是個甚麼是你虛妄之相必不解聽法聞法畢竟那個解聽法聞法你莫見恁麼道便謂實實有法可聽有法可聞卻又墮在虛妄中也不見道法不見法法不求法法不行法法不得法自然得法不可以得更得若向個裏具得隻眼便知諸佛從來無法可說山僧即今亦無法可說大衆亦無法可聽無法可聞亦無聽法聞法者亦無無聽無聞者是名真聽法聞法是名實相是名善持金剛經到恁麼田地立像也得不立像也得燒香也得不燒香也得掛珠也得不掛珠也得如其未然不妨隨衆作些善利猶不失人天福報切不得假名不著相修行作空見外道漭漭蕩蕩招殃禍也餘開示利益語多不録韓居士魏居士領合會衆信請小參師拈拂子一揮云大衆便恁麼去每人腳跟下早與三十拄杖了也何況更要重添枷鎖作麼大衆你于今各人家裡現成茶飯不肯吃反去別處乞野狐涎沫真個可憐生自昔諸佛諸祖出頭來本不曾有一點方法教人祗為你諸人迷頭撞腦造種種業所以萬不得已為說種種法不見道佛說一切法為治一切心若無一切心何用一切法譬如病人一般你若著寒即與你一貼熱藥你若著熱即與你一貼寒藥寒熱無定藥亦無定若守定一個死方必定遭害庸醫殺人千千萬萬所以佛說法如醍醐衆生執之盡成毒藥山僧者裡總無一切法只用一把鐵掃帚逢著便掃善法也掃惡法也掃你圖向山僧者裡討個甚麼作把柄便是帶纍山僧入地獄去不特帶纍山僧兼且帶纍諸佛諸祖入地獄去也何故諸佛諸祖本無有法與人作個把柄可以出得三界可以成得菩提你但將平時胸中善法惡法一齊掃卻自然無菩提可成無三界可出去聖時遙人無正信個個都是要求法底求得善法不過得個人天福報求得惡法必然墮落阿鼻山僧好生不忍所以不惜惡口勸你山僧初到者一方見食素人十有五六好生歡喜細細察來也有習大乘底也有習無為底也有習圓頓底還有極不堪教人發誓教人瞅光教人換氣半夜關門種種做作及乎大家聚集時祗是五部六冊大聲吆喝一場真實可憐佛法就如一大海水一般任你飲一口也得一杓也得你卻嫌大海飲之難盡反去大溝小渠尋水喫甚且去糞坑裡尋水喫可不大癡大愚麼我於今且問你諸人習大乘底還識大乘兩字也無習無為底還識無為兩字也無習圓頓底還識圓頓兩字也無有小乘因說大乘有有為因說無為有漸因說頓有偏因說圓此皆我佛如來因時建立種種名字若論本源心性總沒有如許多般亦無有一切名字你若執著名字以為實有許多般已屬外道邪解何況懸羊頭賣狗肉借他家美名行自己邪法若不早早回頭永墮地獄此世界壞輒移他方那有出頭日子山僧今日不惜口業再為汝諸人一一注破汝才見有大乘即便落小乘汝才見有無為即便落有為你才見有頓即便落漸你才見有圓即便落偏你但識得自己本源心性亦無大亦無小亦不著有亦不著無亦不屬漸亦不屬頓亦不屬偏亦不屬圓是名真大乘是名真無為是名真圓頓大衆要識真大乘麼老鼠倒拖雞卵去蒼鷹生捉兔兒歸要識真無為麼鴉飛塞外枝枝雪鴈度江南處處花要識真圓頓麼芍藥花開菩薩面棕櫚葉散夜叉頭大衆若向個裏會得大乘即是無為無為即是圓頓圓頓即是大乘畢竟作麼生得合一去良久云寶鑑當臺邊月冷龍泉出匣塞風寒以拂子擊案下座住海州接引寺小參僧問朔雪已消和風匝地即此便為淨土如何是安居底句師云池晴魚見日進云為甚道隨緣不變不變隨緣師云堂靜柳牽風進云有心作佛固不是為甚無心猶隔一重關師云退後三步僧進前三步師云天晴不肯走直待雨淋頭進云釋迦睡覺為甚文殊奪卻帝釋位師一喝僧復擬進語師又喝僧禮拜師連喝乃云教中道一切衆生本來成佛又道一切衆生皆有佛性何不道一切衆生現前作佛一切衆生全體是佛既已是佛為甚又喚他作衆生祗為他信不及所以道此是難信之法釋迦老子菩提樹下七日思惟也只為衆生難信恐生毀謗反招大苦所以費了多少周折法華會上智慧如舍利弗神通如目犍連諸大弟子尚且自悔自責道我等不識如來隨宜方便初聞佛法遇便信受思維取證今聞我等皆當作佛心懷疑懼如饑逢王膳未敢即食噫佛在尚且如此至於今末法去聖時遙求其能信愈難之難矣昔大經未來此土止有生公說法超出常流故能使頑石點頭其諸據師子座稱法師者反群起攻擊恨不致之死地圭峰祖師豈不是六祖兒孫他疏圓覺至一切衆生皆證圓覺尚疑翻譯之訛何況淺見薄識之流不將一尊佛推在九霄雲上卻道我等凡夫不過作些好事念幾聲佛希圖臨末梢阿彌陀佛或者可憐見舒一隻手搊我放在蓮花胎裡然猶是徼幸萬一手持木患底有幾個把得穩決定往生明明西土尚且信而不信向他道惟心淨土自性彌陀又如何肯信函可是個大罪人充發到此竊不自揣要開諸佛難開之口豈料諸山咸相敬重即在家善信亦莫不聞風趨向良由此方僧俗都是多劫承事諸佛而來善根成熟不過借罪禿做一條藥線耳不然罪禿口裡不曾吐出青蓮項後不曾長出圓光何足取信於人大衆爾信罪禿不如自信爾若自信人人是佛若不是佛焉知信佛即此信心便是佛心除此心佛更無別佛珍重下座小參師云此事如始病一般有主補者有主攻者補者扶其元氣則外邪自退攻者驅其外邪則元氣自復古來良醫百發百中只因他識脈便能隨宜增減所以沒有一個定法我佛如來稱大醫王救衆生疾苦四十九年中間也無有一個定法乃至末後拈花也是時節已至偶爾成文難道預教金色頭陀參究者一枝花來不成便是達摩西來少林面壁適有神光斷臂乞祖安心祖就機道將心來與汝安神光道覓心了不可得祖隨道與汝安心竟更無別語又何曾當其立雪之時預教伊覓心來祖祖相傳唯傳直指馬大師會下出一百三十餘人其最著如西堂百丈南泉歸宗鄧隱峰之流從未聞某人參某話頭得悟無奈後學病痛多端善知識遂不得不廣立方法然皆是隨時隨機宋朝大慧禪師始一力主張教人參趙州無字後來高峰和尚又道無字不能發疑每每教人參萬法歸一一歸何處天下叢林便專以參話頭為事雖各各示教不同大略不過兩種一種教人提個話頭緊緊守著如雞護卵務使暖氣相續日久歲深萬緣俱謝情識不行便有到家消息又一種教人提個話頭不妨東卜西卜如人攻城東面攻打不開更向西面攻打又如失物此處彼處多方搜尋搜尋到無可搜尋處計窮力盡驀地識得原來只在這裏雖然如是也是隨時隨機貴善用耳邇來坐曲彔木者執為死方不是釘住學人便是移換學人就如庸醫執補底必致助其邪火執攻底必致耗其真氣不能救人反能殺人所以山僧者裏從來沒有一個定法有疑來問底止與釋他底疑有要參究底隨便為舉一則千則萬則止是一則一則若破千則萬則俱破止要汝等生死心切若生死心不切自己不得入手卻疑山僧別有甚麼祕密口訣不肯輕授則是以外魔邪種等視山僧也下座布薩竟師云叢林規矩起於百丈直至於今天下遵守山僧到者方來歷住四剎所應行者漸次舉行唯有布薩一事諸佛恆規所以遷延未舉者只為此方地寒諸大德又多老病不堪久坐今開方便凡老弱及有病者許於兩邊火炕上坐其餘年壯無病者下坐從此半月半月長行勿廢昔僧雲欲廢布薩忽於自恣日被一丈夫捉至三里外古冢中責言何得變亂布薩假充豎義因以刀碎割其膚苦痛難忍衆舁歸懇心懺悔長行布薩十年不缺後臨死異香滿室足見布薩關係最重諸大德慎毋忽諸小參云學道人愛日如金不可虛費山僧每勸汝等莫求速效者正恐汝一心參究又一心欲速此欲速一念便是障道因緣你莫見恁麼道遂一味放寬放寬一念其障道也愈甚昔白樂天問寬禪師云無修無證何異凡夫師云凡夫無明二乘執著去此二病名曰真修真修者不得勤不得忘勤則近執著忘則落無明又棗柏大士有言存修卻敗放逸全乖急亦不成緩亦不得但知不休必不虛棄此真學道要訣古有學射者其師不教渠拈弓搭箭但以髮絲懸一虱於庭令佢朝夕注視旬日之間其虱漸大如甌如盤至於一年之久大如車輪然後以針鋒著矢尖百步外射之正中虱心自是所見無非虱者學人用工能如此何愁不悟耶大衆努力下座丁居士請對靈小參師至靈前以拄杖擊案喚云丁明榮居士又連擊連喚顧大衆云大衆且道山僧恁麼喚丁居士還來麼若道不來非但世間祭奠之禮可費即今又用諷經禮懺作麼若道來者三年一向甚麼處去聻昔日道吾禪師同漸源到一檀越家弔慰源撫棺云生耶死耶吾云生也不道死也不道源云為甚不道吾云不道不道歸至中途源截住云和尚今日須為某甲道若不道打和尚去吾云打則任打道則不道後來漸源卻於村院中聞人誦觀音經忽然醒得方信道吾當日徹底相為大衆試看道吾當日向他道個甚麼那裡是道吾徹底相為處你若識得道吾相為處方知道丁明榮居士今日來無所來者三年一向去無所去聽取一偈無來亦無去真性鎮常住逼塞太空虛覿面渾難遇折腳泥牛踏月行連眉木女向花語驚起南山鱉鼻蛇等閒𡎺倒輪圍柱前三三與後三三半日乾兮半日雨華表千年鶴不歸神山渺渺知何處知何處再聽山僧末後句亡者悉超升存者長歡聚復擊案一下歸方丈小參云老僧在方丈裡終日對著一個火盤諸師各寮也終日對著一個火盤要且不識者個火盤你若識得者個火盤不妨出來通個消息你莫道是銅鐵鑄造底又莫道是關西來底麗國做底你試將自己五蘊身心捏作一個火盤卻將火盤當你自己五蘊身心看是同耶是別耶個裡覷破則不難將現前上天下地人物鬼畜山河草木情與無情以至千百億須彌千百億日月盡不可說不可說微塵佛世界都盧捏作一個火盤頓在面前然後將此火盤散作上天下地人還人鬼還鬼物還物畜還畜山河還歸山河草木還歸草木情與無情以至千百億須彌千百億日月盡不可說不可說微麈佛剎各各還歸本位不妨火盤自是火盤我自是我謂火盤向我亦得謂我向火盤亦得熱時添灰寒時加炭且道炭銷火滅後一句作麼生道良久云老僧到者裡祗覺舌頭短大家歸堂火盤邊參取下座小參云入道場來又過半月了也世間日月如燈焰如河水刻刻遷變人自不覺耳蓋為習氣濃厚貪著眼前將謂後來光景地久天長不知衰老臨頭直至奄奄一息時反想從前多少蹉過眼見一個個含淚而去猶不自家警覺及早回心縱使你不回心盡此一生氣力能扒得到須彌峰頂麼便是世路上順溜底位至台鼎富比陶朱黑面大人難道怕你財勢將你黑業換作白業得麼除非趁此強健早早尋個出路外典亦云朝聞道夕死可矣何況我輩剃除鬚髮更為何事難道為衣為食但免饑寒便應著急將生死二字貼在額門朝參夕究何愁不徹不見道參禪無別法只要生死切但使生死心切則諸餘自然攙奪不得一切妄念不息自息一切業緣不斷自斷就使今生不得徹頭也不致打失人身流入惡道他日出來向此門中亦大省事若只悠悠忽忽半青半黃莫道一生兩生直至彌勒下生依前流浪大衆大須著急自家生死不關他事他人替代不得緣爾不自著急山僧卻為汝著急不禁苦口相勸久立珍重小參云衆生生死大病也佛祖言教良藥也既是良藥而服多不效者祗因未服藥時先有種種狐疑既服藥後又添種種雜毒安望病之能愈耶每見今時道流未曾入門便自心中七上八下蚤無確信及乎進得門來平昔人我見愛憎情不特不能減少而反加增卻要平白地跳到西方除是西方新出一尊人我愛憎底阿彌陀佛方才接引得你者一班好漢不然淨土中那得許多閒剩蓮花與你分人分我愛此憎彼然此人我愛憎不是你一生一世底蓋緣你從無始來迷失本真一向被境風漂落苦海頭出頭沒直至於今須是大丈夫猛烈把歷劫來熟習一刀割斷直下安帖帖地自在解脫不須抬足竟步西方如其未能十二時中常須照管遇緣觸境才覺一念起即自拽轉不見溈山問懶安從朝至暮當何所務安云牧牛溈云子作麼生牧安云一回入草去驀鼻拽將來溈云子真牧牛也學道人能如懶安牧牛敢保個個成辦若一味隨將去續將去日積月深流浪不返反不如在家人種田經商當差過日尚不虛踏國王土不虛飲國王水似現前衆居士到處布施到處聞法不特不失人天果報且當究竟菩提爭似我出家流終日在佛肚裏面分人分我愛此憎彼空除鬚髮枉逐輪回殊可憐憫久立珍重下座小參舉達磨大師云吾法三千年後不移絲髮莫道三千年祗當時得皮得髓底蚤已瓜分了也傳至曹溪先列二支後岐五派臨濟道大凡舉唱宗乘須一句中具三玄三要始得後代卻依古㟷主析為體中玄句中玄玄中玄若非汾陽重陽九月菊花新一頌尚得有臨濟耶洞山權開五位偏正回互後人止知以雪代白以炭代黑但闕道個心字性字便以為觸諱寂音尊者亦復錯認卻引論書解釋曹山三墮正妙在墮字而太陽乃謂墮落之墮至如雲門三句亦自德山密始乃復立道眼聲色種種杜撰惟有溈仰父子投機久矣絶響法眼一枝則流入高麗逮至今日去聖益遠道風愈漓各承師說復昧本宗萬別千差不可窮詰求似五家盛化時天地懸隔又況達磨初來然其所謂不移絲髮者固自昭昭天壤你但識得不移絲髮底便識得千差萬別底千差萬別底即是不移絲髮底山僧今日不免合作一塊頓放諸人面前你諸人好看見麼見麼見則豈特達磨門下西天九十五種此土諸子百家總不曾移一絲髮不信但看天上月每當三五便團圓下座小參云老僧自來不敢過譽於人據實論量現前諸衆盡是頭上足下鼻直眉橫若是世間事有能有不能未敢相許但欲成佛個個有餘爭奈你自己埋沒甘處下劣於世間一切反不避艱大險阻及聞個佛字便爾退縮直無有半個肯承當者昔日慧朗見石頭遂問如何是佛石頭道你無佛性慧朗道蠢動含靈皆有佛性為甚某甲卻無石頭道為你不肯承當又藥山一日問高沙彌云我聞長安甚鬧彌云我國晏然山云你從看經得請益得彌云不從看經得亦不從請益得山云大有人不看經不請益為甚麼不得彌云不道他不得只是他不肯承當大衆你道如何承當你莫向前道我是佛我是佛者豈不成大妄語耶我且問你畢竟喚甚麼作佛盡大地人敢保不識佛尋常座主家尚道佛者覺也只你自家一點覺性有甚難識你若識得直下明皎皎地空索索地覓衆生不可得那討甚麼佛來有人喚伊作佛劈面便唾到者裡縱要承當沒可承當沒可承當方堪承當接續慧命令法久住珍重下座小參桂林問窮子有一寶多年失卻不知是何寶師云是地堪埋骨無嶺不棲雲進云賴遇和尚識得請和尚酬價師云價已酬了試將寶來看進云分明在目前師云莫將魚目當明珠進云和尚大慈師云卻是一顆明珠爭奈不會放光林禮拜師乃舉拂子云只此物非他物日日舉似人爭奈無人識大衆且道是甚麼物你識得也是此物你不識也是此物不見道是法平等無有高下雖然自古及今諸佛聖賢四生六道種種差殊祗為用處染淨不同耳若一向淨用便成覺道一向染用便落輪回用有染淨之分體無淨染之別惟其無別不妨即染以明淨惟其有分不妨還淨而去染所以戒者還淨去染之要門禪者即染明淨之捷徑但到慈航門下禪既不中戒亦不須畢竟是個甚麼良久云待仙人臺進門來向汝諸人道擊拂子下座小參云世人只知出胎為生蓋棺為死殊不知一念有一念之生死一日有一日之生死一生有一生之生死前念迷惑為死後念惺悟為生上半日迷惑為死後半日惺悟為生前半生迷惑為死後半生惺悟為生倘其一生迷惑雖生若死倘其一念惺悟雖死若生了凡先生曾遇一老宿語渠云從前種種譬如昨日死從後種種譬如今日生信知生死無定在當人轉移間耳昨日復初大德入丈室白老僧言多年流浪今始回頭適值母難之辰追念雙親俱亡深恩難報老僧道今日始是汝生日也旁邊閃出一個孩子喚作青菴也道是同日出生老僧笑謂非但汝兩個昨日二三百個盡是初生孩子從前種種譬如已死從後種種譬若再生汝等試思父母未生以前一向在甚麼處著腳即今已生思量要報恩底又在甚麼處著腳心心念念勿令間斷忽然蹉腳踏著本來一塊田地方知道恩本無恩報亦無報亦無報恩者到者裡非特你一生父母便是你生生父母又非特你生生父母凡在此會同聞此法其父母或存或亡無不一時酬恩已竟不見道輪轉三界中恩愛不能捨棄恩入無為真實報恩者擊拂子下座小參師云空中飛鳥不知空是家鄉水裡遊魚忘卻水為性命汝等諸人終日在者裡經行在者裡坐臥並不曾有一點他物隔礙亦不曾有片刻時分間斷你又思量疑擬個甚麼你才起心思量他疑擬他蚤已不相交涉了也先德有言人無心合道道無心合人人道既合是名無事人又道佛亦只是個無事人於今學佛之流每每於無事中生事所以有是有非有得有失三祖道得失是非一時放卻方知真如凡聖總是夢言佛及衆生並為增語到者裡本自無事非故無事若欲無事便是生事衆中倘有伶俐衲僧出來道老漢恁麼道已是無事生事老漢只得向渠道也只為海州金居士趙居士瀋陽詹居士百餘里遠來都是老僧舊檀那無可酬謝不已而已珍重下座小參云即心即佛衲子常談是果是因長老熟套豈不聞祖師門下佛法不存又教老僧如何開口雖然今日三剎諸老到此不可便恁麼緘默去也記得一僧問牧菴和尚如何是佛菴道莫向外邊覓又問如何是心菴道莫向外邊尋又問如何是道菴道莫向外邊討慈航者裡若有人問如何是佛向道莫向內裡覓如何是心向道莫向內裡尋如何是道向道莫向內裡討大衆外邊既不是內裡又不許畢竟在甚麼處良久云寒冬五九盡大地慶春回卓拄杖小參云三祖道大道無難唯嫌揀擇慈航者裡教人卻用著揀擇二字道流祗為不能揀擇以致隨流逐隊沉沒一生有志氣底漢子須是自己放出眼光來分別濁清剖晰邪正夫邪正清濁判然有甚難辨殊不知清中有濁濁中有清正中有邪邪中有正又有似正而邪似邪而正似清而濁似濁而清又有即清非清即濁非濁即邪不邪即正不正你諸人到此總須茫然所以勸你親近上流微細揀擇揀擇來揀擇去忽然打失眼睛方知道清濁邪正全沒交涉到者裡縱欲揀擇無可揀擇無可揀擇方能揀擇昔溈山問仰山涅槃經四十二卷幾卷是佛說幾卷是魔說仰山道總是魔說今日若有人問慈航幾卷是佛說幾卷是魔說慈航卻向他道總是佛說試向者裡揀擇看慈航道得是仰山決定非仰山道得是慈航決定非若揀擇得出許你具一隻眼如其未然大須仔細小參云今日諸兄弟結社請老僧特為證明且問你諸兄弟結社之義何居古有蓮社勸修淨業者亦有菩提社勸發菩提心者于今燈節到來老僧為汝取名曰燈社我法門心心相印喻如傳燈昔呂吉甫答王介甫之言曰日月迭相為明而不能並明其能並日月之明而破諸幽暗者惟燈為然故燈者所以助日月之所不及也賢哲者流容有光照之處何況中人以下循冥索昧大似黑夜行險道中所賴有諸同行之人互相勸懲遇善則勉令有加見過則諫令速改自照常不足照人常有餘彼此相資庶幾不致墮坑落塹若祗如世情相與彼此瞞飾朦朧度日一旦失腳惡途無能相救則又何取諸兄弟為耶諸兄弟惟願顧名思義各各相照非特他照亦復自照照而無照無照常照則諸兄弟人人印心人人傳燈方始不負老僧今日為汝證明也珍重小參云老僧有些陳腐佛法都向陳年裏打發盡了今日諸善信又來強山僧升座要拈些新鮮佛法爭奈不曾備辦賴適才同大衆出行見人家門上都貼個春字忽想當年有個老宿住一菴子門上貼個心字壁上貼個心字窗上貼個心字後來法眼禪師卻向門上貼個門字壁上貼個壁字窗上貼個窗字者兩個老漢一個是空中著楔一個是雪上加霜爭如我慈航門用板做窗用紙糊壁用泥飾任諸禪流要住便住不住便去雖然三十年後玄沙道底下座小參舉涅槃經中廣額屠兒放下屠刀云我是千佛一數者則話人人俱知有底道廣額屠兒是多劫修成底一尊佛不過示現屠兒身耳可謂癡人說夢有底道蠢動含靈俱有佛性難道屠兒沒有佛性佛性雖同必須修三阿僧祗方才得成也是癡人說夢又有底道成佛個事須是大力量漢子似者屠兒提得起放得下一刀兩段爭有成佛不得之理也是癡人說夢後來又有個屠兒正殺豬有省剃頭行腳到一禪師座下禪師問道聞汝殺豬有省省個甚麼渠便以手作鼓刀勢大衆你道者屠兒與涅槃會上屠兒是一般是兩般頃又舉昔日忠道者問東明禪師道楞嚴經云如我按指海印發光意旨如何明云釋迦老子好與二十棒道者云為何如此明云用按指作麼道者又問汝暫舉心塵勞頓起又作麼生明云也是海印發光大衆若向東明句裡會得不但一部楞嚴了然明白便識得者屠兒鼓刀處即是涅槃會上屠兒放刀處涅槃會上屠兒放刀處即是者屠兒鼓刀處到者裡有何善惡之可分又何福之可求又何罪之可懺雖然你若撥無因果招殃不小祗如今日輝宗大德領崔居士等跋涉泥塗來此飯衆大衆如何祝讚卓拄杖云滿身泥水無人識依舊春風送馬蹄下座都寺寂量編書記今羞今何録
