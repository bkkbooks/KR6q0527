body:
  text: 門徒比丘今廬今又重梓拈古世尊與阿難行次見一古佛塔世尊便作禮難云此是甚麼人塔世尊云此是過去諸佛塔難云過去諸佛是什麼人弟子世尊云是吾弟子拈云過去諸佛是世尊弟子且道世尊是什麼人弟子個裡見得堪與諸佛為師忠國師因紫璘法師云請禪師立義某甲破某甲立義禪師破今請師立義師云立義已了紫云是甚麼義師云果然不見拈云若作法師待云立義已了便道破也破也南泉因座主來辭乃問甚處去主云山下去泉云第一不得謗王老師主云爭敢謗和尚泉乃噴涕云是多少主便出拈云者座主不妨伶俐可惜爪牙未具當時見道第一不得謗王老師便向道合取狗口有僧於馬祖前作四畫上一畫長下三畫短云不得道一畫長三畫短請師答師乃畫一畫云不得道長短答汝了也拈云騎賊馬趕賊奪賊刀殺賊馬大師慣得其便要且無定亂先圖若是老僧見伊畫四畫時便向道野狐精識得汝也金牛因臨濟來乃橫按拄杖方丈前坐濟遂拊掌三下歸堂去牛卻下去人事了便問賓主相見各有軌儀上座何得無禮濟云道甚麼牛擬開口濟便打一坐具牛作倒勢濟又打一坐具牛云今日不著便拈云人盡道臨濟不合上門欺人殊不知臨濟被金牛一坐直至於今起不得龐居士坐次問靈照云古人道明明百草頭明明祖師意你作麼生照云老老大大作者語話士云你作麼生照云明明百草頭明明祖師意拈云龐老前行不到女子末後太過有人辨得許你具一隻眼趙州與文遠論義鬥劣不鬥勝勝者輸胡餅遠云請和尚立義州云我是一頭驢遠云我是驢胃州云我是驢糞遠云我是糞中蟲州云你在彼中作什麼遠云我在彼中過夏州云把將胡餅來拈云今人鬥勝不鬥劣古人鬥劣不鬥勝老僧特拈出普示關東僧衆若無如此規則胡餅爭得到老僧口裏汾陽昭示衆云識得拄杖子行腳事畢泐潭澄云識得拄杖子入地獄如箭射拈拄杖云者個是千山斫來底有甚麼難識你等諸人識得也未若不識孤負平生行腳若識又道入地獄如箭射良久卓一卓云老僧足力衰竭遠步少他不得曉愚禪師到五祖戒和尚處戒問不落唇吻一句作麼生道師云老老大大話頭也不照顧戒便喝師亦喝戒拈棒師拍手下去戒云闍黎闍黎且住話在師將坐具搭肩上更不回首直出去拈云一個如龍得水一個似虎靠山簡點將來二俱不了且道甚處見他不了有人辨得老僧性命在汝手裡藥山因僧問己事未明乞師指示師良久云吾今為汝道一句亦不難只宜汝於言下便見去猶較些子若更思量卻成吾罪過不如且各合口免相纍及拈云且道藥山當時是為者僧道不為者僧道良久云一言既出駟馬難追藥山向手中書一佛字問道吾是甚麼吾云佛字山云這多口阿師拈云汝道道吾當日不道佛字得麼不道佛字又合道甚麼字良久云識取鉤頭意莫認定盤星藥山問僧年多少僧云七十二也師云是年七十二那僧云是師便打拈云汝道者僧有喫棒分也無為甚便打若有過在甚處據老僧看來盡天下僧俗凡聖草木叢林盡須擔枷帶鎖始得僧問石霜咫尺之間為甚不睹師顏師云我道偏界不曾藏僧後問雪峰偏界不曾藏意旨如何峰云什麼處不是石霜僧回舉似師師云者老漢有什麼死急拈云雪峰道什麼處不是石霜與石霜道偏界不曾藏是一般是兩般當時若問老僧遍界不曾藏意旨如何便向道者老漢有什麼死急雲居禪師問僧念什麼經僧云維摩經師云我不問你維摩經念底是什麼經僧因此有省拈云既不是維摩經又別有甚麼念底經良久云如是我聞雪峰因僧禮拜遂打五棒僧云某甲有甚麼過峰又打五棒拈云雪竇道前五棒日照天臨後五棒雲騰致雨恁麼判合該五棒東禪道前五棒打者僧禮拜後五棒打者僧無過恁麼判也合該五棒若據老僧看來前五棒棒棒見血後五棒一棒也打不著具眼者辨看金峰因僧侍次乃云舉一則因緣汝第一不得亂會僧云請和尚舉峰豎起拂子僧良久峰云知道闍黎亂會僧以目視東西峰云雪上加霜拈云金峰不合平地生堆者僧又復逆風揚土當時若見道舉一則因緣汝第一不得亂會便掩耳疾趨而出雲門因一僧罷經論來參多時乃云未到雲門時恰似初生月及乎到後曲灣灣地門得知乃舉問是你道不僧云是門云甚好吾問汝作麼生是初生月僧乃斫額作望月勢門云你如此已後失卻目在後此僧果然失目拈云今人盡道者僧不合詆雲門被雲門授記果然失目殊不知者僧至今光明炯炯地舜禪師每訶罵薦福説葛藤禪一日聞懷遷化於法堂上合掌云且喜葛藤樁子倒了也拈云當日兩老同出隻手時人往往作是非人我會不如此爭見肺腹老僧於今要尋些葛藤禪合藥長髭到石頭處頭問什麼處來髭云嶺南來頭云大庾嶺頭一鋪功德還成就也未髭云成就久矣只欠點眼頭云莫要點眼麼髭云便請頭垂下一足髭便禮拜頭云見什麼道理便禮拜髭云如紅爐上一點雪頭便休拈云汝眼本正因師故邪老僧也從嶺南來若遇人問大庾嶺頭一鋪功德成就也未直向道斬絶了也巖頭參德山跨門便問是凡是聖德山便喝巖頭便禮拜洞山聞舉云若不是奯公大難承當巖頭云洞山老漢不識好惡我當時一手抬一手搦拈云跨門便問已是不著便德山便喝令行一半巖頭便拜不是好心洞山云云也是承虛接響巖頭道不識好惡錯下名言我當時一手抬一手搦試道甚麼處是一手抬一手搦處雪峰示衆云望州亭與你相見了也烏石嶺與你相見了也僧堂前與你相見了也保福問鵝湖僧堂前且置望州亭烏石嶺什麼處相見鵝湖驟步歸方丈保福便入僧堂拈云且道二老宿與雪峰相見也未雖然要見二老宿則易要見雪峰則難老僧今日卻道地獄裏與你相見了也餓鬼裡與你相見了也畜生裡與你相見了也若有個漢出來道除卻三途什麼處不相見我且問你東廁一堆灰重多少玄沙與地藏在方丈説話夜深沙云侍者關隔子門汝作麼生出得地藏云喚什麼作門拈云地藏雖然不負來機要且出身無路若是老僧喚侍者點一杯茶來趙州一日在佛殿上見文遠禮佛以拄杖打一下遠云禮佛也是好事州云好事不如無拈云文遠機頭織錦趙州又向錦上敷花若是老僧見人禮佛但合掌云功德無量與趙州是同是別臨濟見僧來豎起拂子僧禮拜濟便打又見一僧來亦豎起拂子僧不顧濟亦打拈云傾乾一大海水魚龍何處藏身燒盡大須彌山虎兕無由躲命咄急急如律令雪峰示衆云三世諸佛在火焰裡轉大法輪玄沙云火焰為三世諸佛説法三世諸佛立地聽拈云雪峰已是白日見鬼玄沙又是鬼見白日每人合喫三十棒且喜不干火焰事僧問巴陵如何是道陵云明眼人落井僧問石頭如何是道頭云木頭僧又問韶國師如何是道師云四生浩浩拈云古人出語實不徒然比如問頭一般答語各別其中一人超佛越祖一人佛祖齊肩一人拖帶佛祖入地獄具透關眼者不妨仔細辨看辨得老僧拄杖子分付與你辨不得切忌誣謗先德一婆子供養一僧一日遣女子抱住云正當恁麼時如何僧云枯木倚寒岩三冬無暖氣女子回舉似婆婆云二十年止供養一個俗漢遂趕出燒卻菴拈云莫守寒岩異草青坐斷白雲宗不妙多少人作此會慚惶殺人要會個僧麼有意氣時添意氣要會婆子麼不風流處也風流頌古世尊四十九日在忉利天為母説法及辭天界下時四衆八部俱往空界迎有蓮花色比丘尼作念云我是尼身必居大僧後見佛不如用神力變作轉輪聖王千子圍繞最初見佛果滿其願世尊才見乃訶云蓮花色比丘尼汝何得越大僧見吾汝雖見吾色身且不見吾法身須菩提岩中宴坐卻見吾法身師云且道色身外別有法身法身外別有色身耶老瞿曇既已欺他女子又復誣彼比丘若據老僧看來須菩提與蓮花色比丘尼總未曾夢見佛身在頌曰漢武求仙不得仙王喬端坐卻升天寶階斷後空岩寂滿塞黃煙夾暮煙世尊一日敕阿難食時將至汝當入城持鉢阿難應諾佛云汝既持鉢須依過去七佛儀式阿難便問如何是過去七佛儀式佛召阿難難應諾佛云持鉢去師云有人道世尊如是召阿難如是應何等分明恁麼會還得也無既已不許恁麼畢竟如何是七佛儀式速道速道道得不妨破瓦碗喫飯不然雖終日持鉢與破瓦碗何別頌曰赤骨律飢便要餐飽則不東家打餅西家茶管他七佛非七佛世尊因耆婆善別音響至一冢間見五個髑髏乃敲一髑髏問耆婆此生何處耆云生人道世尊又敲一云此生何處耆云生天道世尊又別敲一云此生何處耆罔知生處師云耆婆非但第三個不知生處先答生人生天早錯了也若作耆婆待世尊打頭問此生何處但叉手云深領此問頌曰不落宮商調聾人那得聞子期歸去後千古黑漫漫六祖初參黃梅梅問你自何來祖云嶺南梅云欲須何事祖云唯求作佛梅云嶺南人無佛性若為得佛祖云人有南北佛性豈然師云若作祖師才見道嶺南人無佛性若為得佛便禮拜云謝師授記頌曰問處分明答處親欲求作佛枉勞神自傳衣鉢重遭屈直至於今不得伸六祖因僧問黃梅意旨甚麼人得祖云會佛法人得僧云和尚還得不祖云我不得僧云和尚為甚不得祖云我不會佛法師云道會佛法頭上安頭道不會佛法又是斬頭求活畢竟如何得黃梅意旨聻以拄杖趕散頌曰會與不會何交涉黃梅意旨少人知請看樹上金衣子又喚春風過別枝佛陀波和尊者遊臺山見一老人問向甚處去者云臺山禮文殊去老人云大德見文殊還識不者無對師云當時若見恁麼道但云祗如文殊還識某甲也無又云文殊文殊頌曰文殊豈有二文殊尋到臺山也大迂昨夜雪晴雲破處一鉤新月小空虛趙州問座主講甚麼經主云涅槃經州云問大德一段義得不主云問甚麼義州以腳躍空一躍吹一吹云者個是什麼義主云經中無此義州云脫空謾語漢此是五百力士揭石義師云且道是此義不是此義座主若具眼待渠問這個是甚麼義但向道少賣弄或云久知和尚有此機關不特勘破趙州免令錯下注腳頌曰口裡無牙腳底無筋趙州老漢少喜多嗔趙州問僧發足甚處僧云雪峰州云雪峰有何言句示人僧云尋常道盡十方世界是沙門一隻眼你等諸人向甚處屙州云闍黎若回寄個鍬子去師云彼彼相助頌曰對面不相識千里卻同風若無河北輪刀手誰解幫扶老雪峰紫湖門下立牌牌上書云紫湖有狗上取人頭中取人腰下取人腳擬議則喪身失命有新到才相看湖便喝云看狗僧才回首湖便歸方丈師云紫湖可謂老婆心切爭奈無人捨命李居士請師於看狗處下語師直前一摑又云幸是老僧又云業畜不得無禮又於地上作相隨以腳抹卻又以手舉腰帶云個是五百文買底頌曰紫湖一隻狗牙長善抖擻誰論跖與堯彌勒遭一口睦州因秀才相看云會二十四家書州以拄杖空中點一點云會麼秀才罔措州云又道會二十四家書永字八法也不識師云睦州者一點莫道秀才家便是佛來也不敢正眼覷著又云如蟲禦木頌曰一點分明露其如識字多若將八法論鷂子過新羅葉縣省禪師問僧云日暮投林朝離何處僧云某甲不曾學禪師云生身入地獄師云且道是者僧入地獄是葉縣入地獄頌曰學禪不學禪蜂蜜比糖甜生身入地獄千足與萬足楚圓禪師冬日榜示僧堂前作此相若人識得不離四威儀中師云當時若見脫草鞋蘸水向上一擦頌曰天皇皇地皇皇我家有個夜啼郎往來君子讀一遍安眠穩睡到天光九峰在石霜為侍者因普會遷化衆舉首座住持峰云須明得先師意始可住遂問先師道如古廟香爐去冷湫湫地去如一條白練去口邊生醭去首座作麼生會座云明一色邊事峰云未會先師意在座云裝香來我若不會先師意香煙起時脫去不得及至香煙才起首座脫去峰乃於背上撫云坐脫立亡則不無先師意未夢見在師云首座侍者各得一橛雖然總未夢見石霜在頌曰妾乘碧油車君騎青驄馬何處結同心西陵松柏下南泉不是心不是佛不是物師云不是不是頌曰描也描不成畫也畫不就可憐王老師盡底掀家醜楊岐和尚問僧栗棘蓬作麼生吞金剛圈作麼生跳師拍手三下云奈我何奈我何頌曰栗棘蓬誰吞金剛圈誰跳明珠赤珊瑚村郎都不要為甚不要雞鳴天曉僧問龍牙二鼠侵藤時如何牙云須知有隱身處始得僧云如何是隱身處牙云還見儂家麼師云龍牙也是此處無銀三十兩頌曰閃閃爍爍藏頭露腳七尺枯藤挂枝一任霜摧雨剝偈升座示諸子猊煙一縷匝人天絶塞今朝敞法筵才欲拈槌催佛命未曾開口濺狐涎白狼日出冰將泮玄菟春深草已芋慚愧西來正法眼不知滅卻阿誰邊罷座示諸子四十九年沒奈何不堪重入葛藤窩傾將一滴曹溪水泛作千層遼海波兩月以來全露醜半言既出尚嫌多從今拍板拋荒草穩臥龍沙任佛訶藏主刻普濟録成見寄故人天上已經年忽見牛車突塞煙罪過太多增舊案語言欲斷出新編長江皓月應先寄瘴海驚濤孰與傳慚愧無端餘六萬又隨洪範落朝鮮臘八日頭顱如雪淚如麻稽首三千老釋迦此日又添世上佛明星亦是眼中沙金剛一坐魔紛起鹿苑初行路便差不肖兒孫親看破從今何用白牛車閲藏畢示同閲諸子兩載掀殘老葛藤海風習習浪層層微塵剖出看如此一字從來説未曾半榻寒雲連曉磬匝天斜雪罩孤燈寶山入後仍空手欲數他珍竟不能十月八日重升座聞道中峰不上堂小春初霽又逢場何人獨立三門雪有淚難拈一瓣香古鏡乍懸邊月冷太阿欲破塞雲荒猊煙未盡名言絶片石凄凄空斷腸至日罷座示諸子天山雪後大鐘鳴此事那容口舌爭千聖盡從棒下死一陽初向座中生綺筵欲散重添爵戰鼓將收數舉兵拂袖便歸遲八刻更於何處覓王程贈螺灣學道何妨膽氣粗粗中卻自不模糊傳來獨喜新州老放下真憐廣額屠經卷拋殘酣野寢棋枰敲碎發狂呼世間那得寒灰佛面色無慚即丈夫贈祥光不向枯株學坐禪生涯只在钁頭邊豆花香處雲偏濕瓜葉蠻時月更鮮又路泥深休縱步短窗風靜好安眠何須更話西來事雀上高枝噪暮天越方辭往南方行腳偈留煙水瀰漫欲遍參草鞋緊峭杖橫擔別峰只在盧龍塞翻笑南詢五十三贈彼岸誰從烈焰種芙蓉冰作肝腸鐵作胸兒女團圞良不惡卻來荒寺過殘冬南塔結制堅冰漸解柳初黃鈍斧誰將闢巨荒但任疏狂留本色不妨粗糲是家常千群龍象歸華表萬里風沙建寶坊幾向棒頭明正眼混同依舊浩茫茫贈首山律主曾向金剛窟裡回芒鞋盡帶劫餘灰王侯共備香花供龍象爭傳衣鉢來自有模型留磧雪仍將消息問村梅從今擊碎玻璃盞滿目青山即五臺贈靜宇個事還須是個人一回相見一回新好將鐵帚隨身去掃盡長邊萬里塵贈遇緣刀耕火種幾經年鼻孔遭人暗裏穿拽斷草繩何處去依然只在钁頭邊贈越方賣盡袈裟未是貧桃花歷亂不勝春百城煙水茫茫地願作長松拂塞塵贈罄光百轉蓮經志自雄幾年獨占最高峰從今不食爺田飯始信窮兒徹底窮贈壽績身在山中不見山遠隨虎迹度松灣野橋斷處嵐煙盡依舊泉流白石間贈一真漚生漚滅從來假到底何曾有一真踏著上頭關捩子方知佛祖盡瞞人贈淨虛間雲飄盡爾還留萬里長江一葉舟風靜波停山月小碧天如洗夜悠悠贈德光幾度逢人口懶開終年寂守冷山隈白雲坐斷春風至石上靈根帶雪栽贈恆水此事如何可別求寸波才動拍天浮狂心歇得元無事渴飲飢餐卻自繇贈光宇蕭條無奈晚風侵盡日攢眉對遠林直待枝條摧落盡好扶明月上孤岑贈輝光兩載辛勤不奈何擬心求佛蚤成魔門前流水依然在笑指群鷗泛緑波贈明空明得空時卻不空青山突兀半窗中春風過後何人見無數遊蜂逐落紅送振宇海水難將戽斗量龍宮搜盡苦茫茫不如空手還山去六月松風透骨涼寄淨玄見面依然別後思滿簾風雨亂飄絲山前石女生兒後好寫鸞箋報我知贈恥若費盡平生亦枉圖板房伸腳夢模糊利他自利渾間事諸佛繇來不丈夫問湛空病佛祖繇來是病源貪他一粒便難痊要知病裏生涯足藥褁床頭鼠嚙殘禮雪菴祖師塔孤留石塔鎮千山想見當年冰雪顏身後能來天子詔更無一語落人間十二時歌平旦寅強起依然戀草茵抖擻多年爛布衲黃煙一口頗精神將帽整把腰伸莫笑儂家骨相貧雖然不是描金匱門外堆堆白似銀日出卯膏粱米飯連湯攪鹽晝豆豉久拋離兩個鉢頭撑肚飽口嗟吁心懊惱且解褲頭尋虱搔見人禮貌沒些些真個充軍蠻長老食時辰茶水何曾得入唇三官廟裡頻頻走兩個黃冠卻可親間嬉笑妄談論開口不顧時人嗔有日閻羅來算帳耕牛犁舌苦沉淪禺中巳世間似我呆無比輕裘肥馬看他人兩袖𣰦毿沒羞恥枉剃頭稱衲子笙管綾羅都不理盡言寫疏好分錢又愁錯寫教賠紙日南午齋堂板響群僧聚紛紛大醬蘸生茄幾日不曾沾豆腐莫嫌三休道五挑水燒鍋無限苦自家功行沒些些他日作驢填債主日迭未嘗盡千般甘苦味不求世利不求名剩得些兒舊習氣炒麵筋煮白米檀越相邀心便喜一字空言也不諳合掌低頭謝信施晡時申又聽堂中打鼓頻菩提珠子多年別佛號依稀記未真不求果不求因天下頑皮第一人若使韋馱能見過立時敲斷腳跟筋日入酉獨坐無言空自醜削髮離家十一年生世已經三十九不念經不持咒一句彌陀難到口世人盡學怎般修地獄三途鎮長有黃昏戌冷冷尋思事非一前年夾棍去年牢萬種欺凌憑獄卒皮已穿骨也出放汝殘生來念佛誰知到此一年餘依然忘卻波羅蜜人定亥爛綿布被連頭蓋有時一覺到天明有時反覆渾無奈枕頭高帽子大佛意祖意全不會唯有保安與報恩兩處未完口業債半夜子忽憶家鄉萬餘里華首堂頭久不聞兄弟叔姪何棲止細思量今已矣千古罪人身便是當初只道好修行誰料修行到如此雞鳴丑夢裡忽聞鐘大扣探頭被外冷如冰急迭縮腳還縮手磬又鳴魚又吼大家齊念楞嚴咒何曾見這懶阿師不是變蛇定變狗書答李居士書來教洞達詳辨寧學儒者不敢爭衡即學佛者亦當退避三舍良繇確乎有主於中故無之不可在佛言佛在儒言儒可即在儒言佛在佛言儒亦可不則以儒非佛以佛非儒又復以儒非儒以佛非佛是皆胸中無主或恃己見或徇他辭以致同異紛然戈矛遍界倘其有主則自然不徇他辭亦復不恃己見而天壤間自有至切近至簡易亙古今而昭日月爭之未嘗得不爭之而未嘗失如居士所謂仁是也仁者人也非人外別有所謂仁憶罪禿未剃髮前曾于孔門諸子問仁處發大疑情纍日不食既而恍然有會於仁也既而詳閲諸儒語録益確然於所謂仁也逮至出家遍參歷諸甘苦卒無異於昔之所謂仁無加於昔之所謂仁而愈了然于無非仁也皇天無二道聖人無兩心何止六經皆仁注腳三藏十二部亦仁注腳也何也非此則斷斷不可謂是人非此則斷斷無別有可以為人之道苟知所以為人則知所以為儒與所以為佛儒佛異而所以為人則同也既知其所以同而正不必強異以為同故讀至真儒必不為佛真佛必不為儒不覺相視而笑此豈淺淺者能窺之耶然而罪禿終不能已於言者一二淆訛處誠恐學者不究立言之旨循文摘句不特錯認所以為佛并錯認所以為儒則其害匪細如所謂禪學害之者此學禪者之害耳豈禪學能害之耶淨名云佛以一音演説法衆生隨類各得解差別在人不在法也譬若同讀孔孟之書者自宜致君澤民乃有毀常敗度種種不可道者亦可謂孔孟害之耶醍醐上味為世所珍遇斯種人翻成毒藥前普説中所舉皆當世巨公雖所造各各不同猶堪表率非真如毀常敗度者比而罪禿歉然以為未足者正以其入之不深而持之不力耳令其入之深而持之力則所為弘闊勝大者乃其至切近者也所為精微玄妙者乃其至簡易者也極之位天地育萬物總不出當人日用中宋儒謂佛老之害甚於楊墨正繇其不讀佛書故也墨氏當佛法未來恍惚佛之一端然昌黎力闢佛而不闢墨且共尊之世典中往往以孔墨並稱則以其習聞墨氏之説以為猶近於仁而未嘗深窮我佛之説以為與於不仁之甚也夫使佛果與於不仁顧安能使今古尊之信之流傳不絶耶如謂身心之纍輕君父之念亦輕嗜欲之情絶立遠之機亦絶試問從來學儒之學誰無身心之纍誰無嗜欲之情且勿論立人達人求其無愧於吾君吾父者幾人哉罪禿以為事君不能致其身事親不能竭其力者身心之纍重也不能立己以立人不能達己以達人者嗜欲之情深也必嗜欲之情絶而後立達之機鬯必身心之纍輕而後君父之念重至謂功成德備不過一自利自私之人則誠知佛之權而不知佛之實泥佛之迹而未明佛之心也謂佛慈為無緣則誠無緣也謂佛教為無意則誠無意也説法四十九年談經三百餘會皆應機設教初無定旨至其歷劫捨身為物則無緣之慈也慈必無緣其慈乃廣教必無意其教乃神祗如孔氏席不暇暖為時木鐸亦以其毋意毋必毋固毋我設有纖微身心之纍嗜欲之情又烏能法天下師百代為仁之至而義之盡耶我佛教中雖不言仁義然而與子言必止於孝與臣言必止於忠未嘗壞世間相而談實相寶藏論云寂兮寥兮寬兮廓兮上則有君下則有臣父子親其居尊卑異其位華嚴經云佛法世間法若見其真實一切無差別又言菩薩摩訶薩以無障無礙智慧信一切世間境界是如來境界所以古道德入得世間出世無餘必欲強入世而同出世者錯也竟欲岐出世而謂不可入世者尤錯也慧遠法師云釋氏之化無所不可適道固自教源濟俗亦為要務世主若能剪其訛偽獎其驗實與皇之政並行四海幽顯協力共敦黎庶何成湯文景獨可奇哉使周漢之初復兼此化頌作刑清倍當速耳傅大士與梁武書則云以持身為本治國為宗裴休論宗密禪師云忠孝不並化荷擔不勝任吾師恥之是故親師之法有退而奉父母以豐供養為行者有出而修政理以救疾苦為道者妙喜老人曰余雖學佛者然愛君憂國之心與忠義士大夫等喜正惡邪之志與生俱生永嘉所謂假使鐵輪頂上旋定慧圓明終不失又云學不至不是學學至而用不得不是學學不能化物不是學學到徹頭文亦在其中武亦在其中事亦在其中理亦在其中忠義孝道乃至治身治人安國安邦之術無有不在其中者釋迦老子云常在於其中經行及坐臥便是者個消息也未有忠於君而不孝於親者亦未有孝於親而不忠於君者但聖人所讚者依而行之聖人所訶者不敢違犯則於忠於孝於事於理治身治人無不周旋無不明了如上所舉皆學佛者之言也若盡方等所載有資世教之言與歷代帝王暨諸賢哲著論所為陰翊王度者固不可勝述若其執佛之權與佛之迹有似獨善其身論其實與心則不止於兼善天下二乘阿羅漢雖得六通而不能發菩提心佛痛訶之謂是焦芽敗種又何嘗以自利自私而稱之為功成德備耶又何嘗將出世入世打作兩橛耶故謂其專守真常恪持儀範是也謂其盡絶外務則又非也金剛經云如來説一切法皆是佛法維摩經偈云經書咒禁術工巧諸技藝盡現行此事饒益諸群生要之吾佛之道自利利他自他等利正所謂仁也欲學為仁必去其所以害仁者仁之害嗜欲是也孔子曰我未見好仁者又曰我未見好德如好色者也又曰吾未見剛者或對曰申棖子曰棖也欲焉得剛故知理欲必不並行去一分欲則成一分仁欲盡而仁乃至也然仁是何體欲自何生苟知其所生則欲即仁也故曰我欲仁斯仁至矣仁至則無欲矣故欲絶欲斷未有能絶欲者也情愈遏則愈生苟知欲之即仁則雖欲絶之而已無可絶也無可絶而後純乎仁純乎仁則并無仁之可名而又何身心之可纍乎必如此而後可以事親必如此而後可以事君必如此而後可以立己而立人達己而達人會天地萬物為一己而後能推一己以及天地萬物夫是之謂仁夫是之謂人罪禿昔與莂公麗中諸同志當太平無事之日亟亟于現比丘身者誠見斯道不絶如線而世之儒者往往錯認吾佛之教吾佛門中人又鮮克身體力行以大彰其道於天下萬世所以冒難甘刑經萬死而無悔者豈真無一丘一壑之足以藏吾軀耶或詆之以為業既出世矣不應復與世間事或譽之以為是從儒而入佛者故雖出世而猶能克盡世間之分是均之不知罪禿之心者也罪禿之心不過求所以為是人庶幾無愧於吾親庶幾無愧於吾君即無愧於孔孟即無愧於佛祖幸蒙不殺以至於今又七年矣不意此方之人咸相信向信乎人有南北仁無南北又不意天壤間復得我公如有夙契大鬯生平茲緣拈出仁字恰搔著癢處所以不覺葛藤爾爾嗚乎豈易言哉孔門三千三月不違止許陋巷之子其餘則日月至焉非仁之難而絶欲之難也孟子曰養心莫善於寡欲誠有見於嗜欲之難遽絶而姑令寡之亦猶我佛之設優婆塞戒也孔孟遠而微言湮尚賴宋明諸老起而極力荷擔使宋之儒者盡如周茂叔程明道陸象山楊慈湖輩明之儒者盡如王陽明王龍溪羅近溪輩則佛法可以不講雖人人闢佛可也何也仁也至如伊川晦菴皆學為仁而未純乎仁也書不云乎克伐怨欲不行焉可以為難矣仁則吾不知也欲不行猶不可謂仁謂為仁而必無妨於欲則罪禿方將卷舌而退書記今羞録重梓姓氏宰官龔章梁佩蘭李益陽黎延祖彭士檟陳恭尹何志本韓履泰李家祥黃良謙謝周錫李嗣鈺湛上錫衛金章謝繩韓宗騧韓孕祥韓寅光韓孕孝韓雋韓夢麟韓申瑞龔廷樞徐國綬郭炳如何仞樓楊錫震文學唐化鵬王錫遠劉廕禧黎能謙黎述曾韓雍韓岡貽黎振猷陳之琦陳之瑛陳之璋居士何函況區今豁陳灝陳肯拔陳肯挹陳起鵬廖古鑑余燦麟韓應貞法姪海幢今辨法姪華首今但華首常住真實興亙弟子今育弟子大乾古覺寂來心壽今迥覺珠今承古序古賢古江傳元傳觀傳潔傳秉傳智傳攝心求古仁千山剩人可和尚塔銘廬山棲賢函是撰噫真發心出世為前聖後昆荷擔斯道當國家全盛出豪貴才華中岸然獨行無所盻睞始見千山剩人和尚其人也余與剩人明崇禎間先後出師門如左右手聞訃趨芥菴與老人相向啞然其徒之在廣州者露頂跣足再拜稽首而言曰非師莫銘吾師也余曰諾弗敢辭老人復顧余曰然非公莫銘若弟也余起立曰諾弗敢辭翼日返雷峰其徒復至長跪曰某將以是秋奉銘出關門矣吾師光明全藉師筆端照耀塞外塞外人千萬祀知有宗門自吾師始某為吾師請抑為塞外現在將來諸昆弟請言畢泣下稽首不能起余感而諾曰弗敢辭於是載筆為辭曰師名函可字祖心別號剩人惠州博羅人本姓韓父若海公諱日纘中明萬曆進士官至禮部尚書諡文恪母同郡車氏誥封夫人師生聰穎少補諸生有聲性好義豪快疏聞有貧士冤獄自分死師密白得免士方德有司廉斷久而知韓公子所為嘗獨出里門為市兒所窘識者報家人追至將赴理師遽止曰彼惟弗知故敢爾豈有吾輩不能忘人誤犯其豁達愛人類如此文恪公捐館舍京師師奔喪往返萬餘里哀毀未嘗一日間逮歸閉戶絶交遊悒悒無生人趣聞梁孝廉未央好道力致為諸弟受業以此得深知余適余歸自匡山師亟入廣州一見輒曰長齋數月矣專以待公某先文恪生兄弟四人某長未嗣若了此願梵行終吾世余笑曰此白社諸優婆塞事寧區區屬望耶師面赤辭去明日復來曰某妾已孕幸而育得上報先人抑無所憾即不幸亦不復願為俗人矣余曰此吾儕緒餘若為艱言之更有向上在師自此始一意且拉余住止園凡兩月值老人至東官乃相見東官因僧問諸識義老人曰我這裡無五識無六七八識僧曰祗麼則寒灰枯木去也老人曰寒灰枯木爭解問話師從旁不覺擊節老人顧余曰此子根器大利指示參趙州無字有頌呈曰道有道無老作精黃金如玉酒如澠門前便是長安路莫向西湖覓水程從此微細披剝無虛旦夕兩踰歲復聞舉勘破婆子話更豁然識古人長處老人曰子今得不疑也即隨入匡山剃落登具命掌記室還住華首又命充都寺甲申之變悲慟形辭色傳江南復立新主頃以請藏附官人舟入金陵會清兵渡江聞某遇難某自裁皆有挽過情傷時人多危之師為之自若卒以歸日行李過城閫為守者擒送軍門當事疑有徒黨拷掠至數百但曰某一人自為夾木再折無二語乃發營候鞠項鐵至三繞兩足重傷走二十里如平時江寧緇白環睹咸知師道者悉含涕不敢發一語後械送京邸途次幾欲脫去感大士甘露灌口乃安忍如常逮至下刑部獄越月釋發瀋陽師自起禍難至發瀋陽兩年於此與縶維同參法緯訖諸徒共五人外無一近傍然內外安置極細如獄中一飲啖一衣屨隨意而至如天中人師當時所能自為者順緣耳庸詎知已有人屬某緇屬某素甲事若此乙事若彼開士密行不令人知何擇時地然師所以獲是報者豈非平生好義暗中銖縷不爽諸如道在人天且當作別論也師初至瀋陽觀知根欲因達藏主藏普濟先為諸苾芻疏通義學時講席漸散多集座下講師頗覺師乃領大衆趨教同學人講師意始解自是瀋內外護咸仰師寬大益篤信宗門開法之日元旦喇嘛率諸遼海王臣道俗稱佛出世清法僧屬掌教亦極力推自普濟歷廣慈大寧永安慈航接引向凡七坐大剎會下凡五七百衆在大老若大來左公吉津李公昭華魏公龍袞李公雪海郝公天中季公心簡陳公始以節義文章重後引為法交師自處孤潔與人慷慨多意氣匪深於師平日鮮不以才氣相掩以故法海深向非凡器所能搆嘗有書抵余曰門下龍象如雲若得專一人來使某得盡其夾輔之力則曹源一滴長潤塞下噫余於此知師為法求人之切豈無所見顧再易裘葛耳忽一日曰我後十日必去集大衆告誡皆宗門勉勵語搜丈室無長物平日所畜衣拂如意杖笠悉分付侍僧孑然一身從金塔趨駐驛囑行後全軀付渾河示偈曰發來一個剩人死去一具臭骨不費常住柴薪又省行人挖窟移向渾河波裏赤骨律祗待水流石出衆環跽乞留肉身哀懇再三乃默然遂端坐而逝瀋之人迎龕入千山建塔蓋順治十六年己亥十一月二十七日也師世壽四十有九坐夏二十得度弟子今育今匝今曰今廬今又今南皆江南人師住瀋不輕為人剃髮有乞戒悉命禮天顯律主師未開法時嘗為顯作闍黎及説法顯請入室師亦命第一座更為傍通華嚴梵行凡戒壇仍使主之惟宗門提喝無少假然皆一目同人衲子能具精識隨機大小各有所被故十年相依如正寓恥若罄光湧光作麼若而人咸受益焉是宜銘銘曰山川奇秀蔚為異人意氣雲蒸公族振振儒門淡薄歸復能仁溯洞水源沛流潺湲出華首嗣為博山孫如溈之嚴吾師有言慧寂者誰實難為昆嗟大樹叢宜蔭南宗天龍等視匪法運窮愍彼遐方啓拓關東彼土惇直惟經與律拄杖撥開別傳甫及七住道場萬指林立天資雄邁波瀾澎湃上下左右不知其在巍巍堂堂曷云誰至杲日方中忽然西逝道俗涕潺湧塔千山為存為歿松鳴珊珊朔方少室今古斯一奉天遼陽千山剩人可禪師塔碑銘銀州郝浴撰考釋傳洞宗博山之嗣曰華首獨千山剩大師函可實印其法可字祖心嶺外聞家兒也以世度滄桑號剩人始生而齔隨父謁任長安道出匡廬山下止驛亭仰金輪峰倣佛記白蓮開謝成措大用象山慈湖書説魯論偶下一指於之邊云若於此識得盡十三經可貫一座齒冷時年十八九每汗患世習命寫生手戲圖為意中幻肖初而拱象擁矛遲而囊頭貫手幅盡一比丘現趺巖雨花時室中黛墨如林怪之居無何扶父櫬過閭門墮水鷗沒反眼視黛墨皆髐然骷髏矣遂啞然蹇裳而去先是孝廉曾宅師雅善華首常造師必挾首説相劖削師疑而頷之及墜足吳門忽智其説直走雙柏林謁首首才臞然瓢笠而已為拈趙州無字逼師師衝口呈偈首盡叱之一時信猛俱發七八日似木偶負墻忽一夜雷電薄窗不覺胸次劃裂二十年疑關盡撤曉而唱曰門前便是長安道莫向西湖覓水程自是密拈古人無不犁然深解他日為舉九峰參真淨話師撲地稽首首喜曰得子不疑吾宗振矣遂引入曹溪禮祖下髮登具於舟中左右諦觀宛是幅末畫人殆識也而曾孝廉亦已儼然在坐比肩現知識身矣師是年二十有九時崇禎十二年六月十九日也庚辰上金輪峰入古松堂一如夙契明年禮壽昌塔又明年禮博山塔甲申年三十有四值世變再作於戊子四月二十八日入瀋奉旨焚修慈恩寺時已順治五年矣吾上人延師閲藏為演楞嚴圓覺四輩皆傾漸拈教外之傳稍稍示洞家宗旨凡七坐道場趨之者如河魚怒上六七年起大疑生大信采珠投針之徒每叉手交腳於巖壑間不去師知悟門已開且就化目衆歎曰釋兒識西來意乎追念吾在家時曾刺臂書經以報父及出家而慈母背反立解條衣披麻泣血以葬之是豈愚敢先後互左而行怪顧創巨痛深皆不知其然而然也是西來意也丙戌歲本以友故出嶺將挂錫靈谷不自意方外臣少識忌諱遂坐文字有瀋陽之役是亦不知其然而然也是西來意也重示偈曰發來一個剩人死去一具臭骨不費常住柴薪豈勞行人挖窟移向渾河波裏赤骨律祗待水流石出言訖坐逝報齡四十九僧臘二十翼晨道顏如生浴拊其背哭之雙目忽張淚介於面嗚呼師固博羅韓尚書文恪公之長公子也文恪公立朝二十年德業聲施在天下門下多名儒巨人故師得把臂論交雖已聞法而慈猛忠孝恆加於貴人一等甲申乙酉間僑於金陵顧子之樓友慟國恤黯然形諸歌吟不悟遂以為禍然事干士大夫名教之重江左舊史聞人往往執簡大書藏在名山是殆獅象中之期牙雷管而袈裟下有屈巷夔龍也當其遭誣在理萬楚交下絶而復蘇者數口齒皭然無一語不根於道血淋沒趾屹立如山觀者皆驚顧咋指歎為有道甲午九月浴始得見師於高麗館海口鐘發眸子電爛一接談徹三晝夜粹白瀟灑不聞隻字落禪浴竊歎梅嶺南曲江丰度久墜堂簾曹溪法雨誰霑世界今觀其父子間入世出世兼擅二賢之美於一家豈非天壤間希有事耶至其藏密於發慧之餘混迹勞侶其僧皆堆堆惟戒課之修乃一旦全啓其知覺非大師智圓而語軟以了無遮結之聰明行決無退轉之慈悲安能使鴨西數千里奉為開宗鼻祖哉記丁酉冬在瀋南塔院一燈相對語洞濟二家之奧皓月江翻霜鋒電掃因極贊壽昌暗藏春色明露秋光之語以為知言復曰趨閃回互恰卻現前未易為君描畫矣師居嘗好跣到積雪攔門猶浩然白足而出始以逮入京絶粒七日時有一美丈夫手甘露瓶倒注其口及蘧神采益陽陽方知大士密留為十二年撥種生芽地也計當勝國之末一老比丘力驅是可一輩人入道且師弟子類能以高躅保其真諦足見茟首更見洞宗惜天下宗門上客不得再見吾雪窖冰天空明微妙之剩人也所著書及得法人附記碑陰自示寂之年臘月初四日龕肉身詣千山龍泉寺護真師閲藏辛丑迎至大安壬寅六月十九日巳時入塔塔在瓔珞峰西麓下是為康熙元年迄十有二年癸丑四月浴自銀州冒暑登山裝香塔下而銘之曰西竺自嫌書太粗香至之兒口傳無常恐破顏花在手無與神州五丈夫嵩陽膝雪披屈絢能者遂取摩尼珠空階不拾石頭出二支五派各分途誰從雲路歸曹洞請看明月鷺鷥圖話到博山三十代菩提樹緑一千株南海陸開寶掌三歲登樓歎蜘蛛磨刀自下娘生髮騎牛無語入匡廬靜看世界悲才子密引雙龍入紫盂一龍順行一龍逆飛劈虛空墮上都一朝洞家法幢起插向萬年冰天裏彩日輪飛樓閣紫正照華師弟二子如大火聚尺有咫一衆頭燃那撑抵窗外雪花燈前蕊九十六轉問殺爾漫發木魚鑽故紙吹毛有口野干死悄向聲聞鳴一指甘露門開舌盡舐撫琴作舞今已矣間為謫官説歷履曾詠蓼莪吟蘭芷敢抵素王忠孝理讀破二十一部史誰居精華誰居秕升堂有路平於砥吾徒努力雪行止蹕峰雲鎖玉為几鴨緑環流清見底薥米無雙天下美坐齋香飯精如此鶴林忽白垂一趾瓔珞峰西肉身是當年相好誰能似金繩界處儼慈氏于今有塔直如矢萬峰朝拱一峰倚晝夜松濤灌左耳大覺千齡護帝里四天垂青抱百雉洞宗之傳又此始有語録十卷及剩詩三卷嗜老易有坎困二卦説與左大來李吉津季天中陳心簡論格物勸學書與希與焦冥論南華書行於世高足有今方今羞今何今衍今希今子今仿今獅今育法付方書付羞何以下聞修各有差損資王兗州全忠為多守塔有古下剩公字之為不離步
