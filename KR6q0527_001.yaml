body:
  text: 門徒比丘今盧今又重梓上堂師受廣慈請拈疏示眾云毫端現寶王剎高拄梵天筆底生優曇花香飄沙磧非關鼻嗅豈在目觀倘其根境猶拘合借唇皮重剖掛鐘板師執椎顧眾云曹溪滴水傾來遼海千尋羅嶽片雲飄作白山萬疊大眾若向雲未生波未動時拂袖便行猶較些子如其未能急須著眼遂擊板云看又擊鐘云看看師至法座前云狂風匝地荒艸連天縱饒釋迦到此未免攢眉假使彌勒親來也難措手顧左右云大眾且道斬艸闢荒一句作麼生道莫有道得底出來同出隻手如無者裏只須推與罪禿去也遂登座拈香祝聖竟復拈香云者一瓣香從南天竺國移來向少林石壁栽培用曹溪香水灌溉敷榮暢茂直至於今卻從華首臺上分得一枝今日向南𡼪第二番拈出專為現住福州上空下隱大和尚用酬法乳之恩斂衣就座座元白椎云法筵龍象眾當觀第一義湧光出禮拜問達磨西來面壁少林和尚西來開堂長白未審長白與少林相去多少師云山前華表千年古門內浮圖百尺高進云恁麼則今昔同風學人立雪有望請問和尚如何是安心要訣師云層層鈴鐸語分明進云爭奈學人不聞師云隨聲逐色漢進云三聖道我逢人則出出則不為人意旨如何師云大似抱贓叫屈進云興化道我逢人則不出出則便為人意旨如何師云也是掩耳盜鈴進云為人不為人且置現今一句請和尚道師豎拂云會麼進云不會師云季春猶寒光禮拜歸眾又僧出問師子一吼百獸腦裂祗如深窟蝦蟆又爭奈何師云鋼刀不斬無罪之人進云慈悲何在師云闍黎自家照顧腳跟僧禮拜師乃云法幢高豎祖印新開且道印文落在甚麼處以拂子打圓相云大眾請著眼若向個裏覷得不妨撒手便行如其未然徒勞拱立頃又喚大眾云去聖時遙信根薄劣彼尚爾爾何況於斯所以山僧到來一向塗朱抹粉弄鬼裝神惹得爾者裏喜底喜笑底笑怒底怒罵底罵今日未免重拈拍板另換新腔且道如何是斬新曲調擊拂子云誰道玉門春不度池邊楊柳漸抽絲座元白椎云諦觀法王法法王法如是下座上堂云第一句下薦得堪奧佛祖為師第二句下薦得堪與人天為師第三句下薦得自救不了臨濟老漢恁麼道已是將三杓惡水向你頭上潑了也當時有箇僧又要向蛇腹下安腳馬頭上栽角問道如何是第一句濟云三要印開朱點窄未容疑議主賓分如何是第二句濟云妙解豈容無著問漚和爭赴截流機如何是第三句濟云且看棚頭弄傀儡抽牽全藉裏頭人大眾且道當時臨濟是恁麼道不是恁麼道若道是恁麼道未免拖帶臨濟入拔舌地獄若道不是恁麼道又未免拖帶山僧入拔舌地獄震聲一喝云山僧今日將三句一齊向你諸人道了也你諸人作麼生薦大眾此事決定不在語言文字上若在語言文字上那識文字底會說會道底修行有分那不識不會底便於修行絕分了也我佛如來始從鹿苑終至金河中間四十九年世間好話無不說盡末後靈山會上卻又拈起一枝花八萬人天唯摩訶迦葉破顏微笑世尊道吾有正法眼藏涅槃妙心付囑摩訶迦葉遞代相傳至達磨大師不避勞苦來到此方不立文字直指人心見性成佛六祖道道個直指已是灣曲了也何況又用許多閒言長語祗為你諸人一向在故紙上鑽研依他作解障自悟門所以費者些老漢如許心力各立門庭各設方便無非要你諸人直下識取不可拘拘向語言文字上尋討大眾既不許向語言文字上尋討畢竟如何即得復震聲一喝下座上堂舉鹽官和尚示眾道一切眾生皆有佛性溈山和尚示眾道一切眾生皆無佛性者兩個老漢若到山僧者裏每人與他三十棒大眾畢竟作麼生道得是爾若道有便上鹽官底釣竿你若道無便上溈山底釣竿你若總不恁麼道又上山僧底釣竿離鉤三寸速道速道喝一喝云垂柳綠毿毿日午好遮陰下座上堂師云剎竿向汝道了也三門向汝道了也四天王向汝道了也法座燈籠向汝道了也汝等諸人還聞麼若未聞山僧只得為汝重宣此義下座上堂云佛說一切法為治一切心爾若無心更何有戒諸菩薩汝等本源與佛無別祗因爾不識本源清淨之心妄起種種塵勞之心所以煩他諸佛立種種戒法釋迦老子臨涅槃時再三囑付我滅度後汝等當以波羅提木叉為歸依所以戒在則佛在戒無則佛無湛堂禪師初參梁山山云驅烏未受戒敢學佛乘乎堂捧手云壇場是戒耶三羯磨梵行阿闍黎是戒耶雖然敢不受命遂詣康安律師受具溈山和尚道止持作犯束斂初心然初心一步也傳佛心宗千里也焉有一步不能行而能走千里者若據山僧說亦無遠近之分但明一步則千里立至千里不出一步只爭汝等肯發心不肯發耳一念回心便同本得不得輕於初學梵網經云眾生受佛戒則入諸佛位汝等一念回心受戒實實與諸佛諸祖體無有二汝等不得自生卑下於今出家人不肯發心總是卑下自安恐怕受戒之後事事有礙不敢容易殊不知未受戒人事事有礙受戒之後卻事事無礙何故不受戒便不是佛子國王水土十方檀施一切無分二時粥飯總名偷食便是自耕自鉏也是偷他國王水土爾若受戒即位同大覺一切受用自在無礙今日新發心菩薩齊集座下山僧好生歡喜恨不得將身供養何故汝纔發心即此一心即便是戒更無別戒即便是佛更無別佛大眾珍重下座浴佛日上堂云今日是我佛如來降誕之辰天下叢林例俱浴佛且道佛還來受浴也無又勿論天下叢林祗如當年舍衛國中九龍吐水是浴佛不是浴佛不見道佛身充滿於法界畢竟向甚麼處浴底是驀拈拂子云釋迦如來生也以左手作兜水勢云日吉時良四面八方洗除殃罪永保安康目顧左右云眾中莫有跛腳阿師麼切忌一棒打殺何故以拂子拂一拂云塞外無風長黯黯且留殘命拂黃沙下座上堂云世出世間若見其真實一切無差別若是出家底識不得破名為出家在家若是在家底識得破名為在家出家若是男子識不得破名為戴鬚眉底女人若是女人識得破名為少鬚眉底男子祗為你等識不得破便道你是在家我是出家你是出家我是在家你是男子我是女人你是女人我是男子種種分別祗此分別心便是你生死根源百劫千生輪迴六道你若向父母未生以前一眼覷著個裏還有在家出家女人男子種種分別也無實實見得無有種種分別然後不妨出家底一任出家在家底一任在家男子自是男子女人自是女人各各現成各各自在更不須移易一絲毫許你莫道女人有五障畢竟要求轉男身方得成佛據山僧看來若男子識不破不特五障千障也有萬障也有女人若識得破要求半障也不可得你切莫執死言句自生退屈甘為下劣不見當時有個官人他底姑出家參方回來要出世為人官人請一禪師勘驗他那禪師問道聞汝要出世為人是不答云是禪師道女人有五障如何為得人答云豈不聞法華經中八歲龍女供珠成佛麼禪師道龍女有百千神變你試一變看答云直饒變得也是個野狐精又當日臨濟會下有個灌溪和尚來到末山尼會下末山打鼓上堂灌溪出問云如何是末山境尼云不露頂又問如何是境中人尼云無男女相又問為甚麼不變尼云不是神不是鬼變個甚麼你看他兩個豈不都是女人前後吐辭若出一口只為他每識得破便稱大丈夫天人師大眾若識得破個個都是大丈夫畢竟如何方喚作大丈夫卓拄杖云雪裏芙蓉香朵朵鏡中柳葉曲灣灣下座上堂舉七賢女對帝釋要三般物一要無根樹子一株二要無陰陽地一片三要叫不響山谷一所釋曰一切所需我悉有之若三般物我實無有乃云可惜堂堂天帝被者七個女子當面熱瞞當時若作帝釋但叉手向前云願諸姊納少供養看他作麼生收領頃復云山僧一貧徹骨大眾一切所需山僧俱不能辦若論者三般物卻實不難驀拈拄杖云誰要誰要一僧出禮拜師連打數下下座上堂師舉金剛經云過去心不可得現在心不可得未來心不可得既是不可得又喚甚麼作心於今學道人都因妄認四大為我身相六塵緣影為我心相所以分彼分此分善分惡分聖分凡分男分女分在家出家種種分別若知心不可得彼亦不可得此亦不可得善亦不可得惡亦不可得聖亦不可得凡亦不可得男亦不可得女亦不可得在家亦不可得出家亦不可得一切了不可得併此知不可得者亦不可得不可得中只麼得然後不妨在彼成彼在此成此在善修善在惡去惡在聖離凡在凡希聖在男為善男在女為善女在家則現居士身而說法出家則現比丘身而說法不見道豎窮三際橫遍十方隨處隨時隨心自在咄且止且止即今直截一句作麼生道但得冰消去長河依舊流卓拄杖下座上堂舉豐干到五臺逢一老人便問莫是文殊麼老人曰豈可有二文殊干作禮未起忽然不見乃云者老人當日被者一問已是逼得上壁可惜放過一著若見道豈可有二文殊便與攔腮一掌云野狐精饒者老人有通天伎倆也沒躲避處驀拈拂子云文殊文殊一僧出云和尚莫眼花師便下座上堂師云洞山和尚有一偈云貪嗔癡太無知賴我如今識得伊行便打坐便搥分付心王仔細推無量劫來不解脫問汝三人知不知又神鼎和尚有一偈云貪嗔癡實無知十二時中任從伊行便往坐便隨分付心王擬何為無量劫來本解脫何須更問知不知山僧不免醜婦效嚬也有一偈貪嗔癡我自知渠即我兮我即伊行著屐坐披衣不識心王分付誰要求解脫添枷鎖缺口沙盤壓稱錘大眾汝若向洞山處悟去成佛有分若向神鼎處悟去天上人間隨心自在若向山僧這裏悟去入地獄如箭射今日是罄光大德遣渠姪化眾檀設供要與大眾同種成佛根因且喜施者受者一時立地成佛只可憐老僧向人天眾前錯說一偈即今入地獄去也伏乞大眾不吝慈悲出來相救堂主進云廚房齋已齊備專候和尚師云你是一尊成佛底進云和尚是甚麼心行師云恁麼則不成佛也進云雪上加霜師便打桂林進云三伏天暑請和尚歸方丈師云恁麼則攜手同歸也林無語師云又是一尊西堂出禮拜云某甲願隨和尚去師云爾作麼生去進云鍋湯裏添火冰山裏澆水師云情知爾去不得復云大眾人人成佛不肯相救只得倩拄杖相救去也卓拄杖下座解制上堂舉翠巖和尚道一夏與諸兄弟東語西話看翠巖眉毛在麼長慶云生也雲門云關保福云作賊人心虛大眾你看他古人恁麼酬唱可謂一盲引眾盲遂以手撥眉毛云且喜且喜賴是山僧一夏與諸兄弟並不曾東語西話下座上堂卓拄杖云諸善知識放下著復卓一下云諸善知識放下著又卓一下云諸善知識放下著且道放下個甚麼莫是把人世貪名貪色貪利一切念頭放下麼未合老僧意在莫是把成佛作祖了生死出三界最上最上念頭一切放下麼未合老僧意在又莫是把放下也放下麼猶未合老僧意在昔世尊因黑氏梵志來獻合歡梧桐花世尊道放下著梵志將左手花放下世尊又道放下著梵志將右手花放下世尊又道放下著梵志道兩手中花俱已放下又放下個甚麼世尊道我令汝將外六塵內六根中六識一時捨卻大眾作麼生說個捨底道理餘且勿論只於今二時粥飯一頓少不得豈不是味邊地苦寒身中綿衣一件少不得豈不是觸難道忍饑耐寒喚作捨麼又難道去投太子河淹殺喚作捨麼山僧在南塔結夏一百三十五日不知廢了無瑕大德多少口舌化米化麵腳底皮也走薄了於今結冬第二日又是無瑕父子領同李居士諸檀設供大眾怎麼食去甚是容易你莫道念幾聲佛誦幾句經便消得他底麼諸善知識你於今直下放得下便識得世尊當年道底若識得世尊當年道底便識得你現