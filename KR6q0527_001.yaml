擊拂子云舊宮瓦礫新除盡淡飯粗茶且過時下座上堂舉雲門示眾道結制來十餘日也寒山子作麼生大溈真如示眾道結制來十餘日也水牯牛作麼生圓悟示眾道結制來十餘日也鐙籠露柱作麼生者三個老漢可謂各出新裁照耀千古山僧者裡卻不然結制來十餘日也痾屎撒尿作麼生你若向痾屎撒尿處識得便識得鐙籠露柱你若識得鐙籠露柱便識得水牯牛你若識得水牯牛便識得寒山子你若識得寒山子便不難拈蓋州作海州移海州作蓋州將崇教興隆道林上帝與接引打作一個道場而其中已受具者不得輕於未受具者然後海州不妨自海州蓋州不妨自蓋州蓋州諸剎僧不妨來齋接引僧接引僧不妨受蓋州諸剎僧齋而其中未受具者便須急急發心受具何故卓拄杖云絲絲春雨原無擇爭奈花開有後先下座浴佛上堂維那問古人道不論禪定解脫唯論見性此中有幾人見性師豎拂云一二三四五進云東風一拂萬卉齊敷又何多何少師云五四三二一進云門前師子未肯點頭在師云情知你數不出那一喝師云恰那禮拜師乃云今日是我佛如來降誕之辰凡在浴佛毋論僧俗男女俱是親蒙佛記而來山僧記得一則舊話特舉似昔遵布衲浴佛次藥山問云者個從爾浴還浴得那個麼遵云把將那個來山無語後人紛紛卜度道者個是幻身那個是法身又有底道幻身即法身法身即幻身如何又分者個那個似者般商量總未曾夢見佛身在豈特不曾夢見佛身并未曾夢見二大老在你若數得山僧適纔答者僧話是多少數便會得二大老道者個與那個會得者個與那個方纔見得佛身畢竟如何是佛身卓拄杖云九龍新吐水塞艸盡含滋下座上堂僧問四塞河山全歸個裡如何是個裏師云城邊四月桃花放恰似嶺南正月初進云恁麼則立處全真也師云無人知此意令我憶靈雲僧一喝師云你者一喝落在甚處僧擬進語師云趕出去乃云到者裏不用如何若何適纔撞鐘擂鼓山僧陞座早已將無量百千三昧分付與你諸人只是你諸人不知非但你諸人不知不見道釋迦三昧迦葉不知迦葉三昧阿難不知阿難三昧商那和修不知商那和修三昧優波鞠多不知若據山僧看來釋迦三昧釋迦不知迦葉三昧迦葉不知阿難三昧阿難不知商那和修三昧商那和修不知優波鞠多三昧優波鞠多不知便是山僧三昧山僧也不知祗如你諸人五更聞鐘早起日午聽板過堂從東邊入西邊出還至各堂晏坐經行各各俱有無量百千三昧爭奈你諸人不知卻反去向佛邊求祖邊求遠之遠矣何況又有一種無知外道教人瞅光看影聽天鼓覓虛聲豈不是平康道上自己掘個地獄去鑽麼大眾不用遠求但向你平常日用中體究忽然知得便可與釋迦迦葉阿難商那和修優波鞠多以及西天東土歷代相傳天下老和尚把手共行既然如此為甚山僧適纔又道釋迦也不知迦葉也不知阿難也不知商那和修也不知優波鞠多也不知不知底與他三十棒知底也與他三十棒畢竟作麼生李居士一向好善今日合家前來齋僧大眾且去飽餐一頓下座上堂云昔日石室和尚每見僧來拈拄杖云過去諸佛也恁麼現在諸佛也恁麼未來諸佛也恁麼後來圓悟和尚卻拈拄杖云過去諸佛不恁麼現在諸佛不恁麼未來諸佛不恁麼者兩個老漢分疆立界各得一半或者道恁麼底也是不恁麼底也是又有道恁麼底也不是不恁麼底也不是又有道有時恁麼有時不恁麼有時恁麼中卻不恁麼有時不恁麼中卻恁麼山僧者裏從頭棒將去只今恁麼不恁麼且置祗如過去佛過去未來佛未來現在佛畢竟在甚麼處舉如意云縱饒你識得現在佛且不知我者如意子來處你若識得如意子來處一生參學事畢下座上堂云昔日石鞏慧藏禪師專以弋獵為務惡見沙門一日因逐鹿過馬祖菴前馬祖逆之渠問馬祖曾見鹿過麼祖道汝是何人渠道獵人祖道汝能射麼渠道能射祖道一箭射幾個渠道一箭射一個祖道汝不能射渠道和尚能射麼祖道能射渠道一箭射幾個祖道一箭射一群渠道彼此都是生命何用射他一群祖道汝既解恁麼道何不自射渠道教某甲自射直是無下手處祖道者漢曠劫無明煩惱今日頓息山僧今日為甚舉者一段因緣祗因丁四居士少年好獵偶於千山撞遇老僧老僧向道嬉戲小事性命大事何為取樂一時害他多命居士聞言頓解臂鷹誓不再畜一時同去如趙居士等咸發歡喜歸向三寶則是馬祖一箭當時止中得一個石鞏山僧一箭不特中了丁居士且中了趙居士等同去多人又不特同去多人而且各各回來牽累諸兄弟諸親戚凡來山僧座下聞一言半句者無不人人中箭了也大眾生佛本自無殊祗因你一向馳逐不肯回心所以去佛日遠你但一念回心便同本得又何必讓他古人耶若使人人都如丁居士一言之下頓爾回心則人人石鞏人人是佛如或躊躇似信不信則不特臂上鷹一時解不脫百千萬劫枷鎖永解不脫也所以道學道須是鐵漢把手心頭便判直趨無上菩提一切是非莫管珍重上堂舉洞山虔和尚垂語道有一人說過佛祖一步行不得有一人行過佛祖一句說不得有一人說得行得有一人說不得行不得阿那個是其人當時座下有個石柱禪師出眾道說過佛祖一步行不得者祗為無舌不許行行過佛祖一句說不得者祗為無足不許說說得行得者祗為函蓋相稱說不得行不得者如斷命求活山僧者裡卻不恁麼道若有說過佛祖一步行不得者山僧儘著他說行過佛祖一句說不得者山僧儘著他行說得行得者山僧塞卻他口捶折他足說不得行不得者山僧與他同起同臥同生同死大眾且道畢竟阿那個是其人以拂子指云千山石窟雲多處衲被蒙頭百不知下座上堂云此事不在高遠汝但向現前日用中徹見得佛在此儒亦在此不見道道不遠人人之為道而遠人人在道中如魚在水中不論你為與不為你縱不為亦在其中你纔起心動念去為早已錯過了也儒者又道誰能出不由戶何莫由斯道也又道人莫不飲食也鮮能知味也古先每每向你現前飲水食飯處舉足動步處分明指出你卻不會反去別求所以愈求愈遠王居士昆玉皆前代儒生今日領諸檀前來乃以佛求山僧山僧卻告以儒古有道學佛然後知儒殊不知是儒何須學佛六祖大師云世人若修道一切盡不妨又云佛法在世間不離世間覺離世覓菩提恰如求兔角你若向現前日用中徹見得佛法世法打成一片所謂入得世間出得世間出得世間入得世間又何儒佛之分不分耶只恐你彼此浮游不知下落到末梢頭捏著空拳業識茫茫無本可據縱饒平日絕世才華沖天志氣少不得向驢胎馬腹亂撞去也大眾日月逝矣人壽幾何著急向箇裏討個下落莫待臨時悔恨何及下座上堂云今日是盛亭大德首七之辰渠徒奉遺命同佢本剎諸師前來設供仰憑大眾以般若力資助往生頃舉長沙岑和尚因亡僧以手摩云此僧卻真實為諸人提綱商量會麼遂有偈云目前無一法當處亦無人蕩蕩金剛體非妄亦非真大眾既非妄非真喚甚麼作金剛體又雪峰和尚因亡僧有偈云低頭不見地仰面不見天欲識金剛體但看髑髏前祗如盛亭大德一個髑髏早已化成灰土了也畢竟金剛體在甚麼處大眾你欲識金剛體麼但你諸人現今兩邊跕立底便是你若向者裡直下覷著不特盛亭大德實未曾死即你諸人現在實未曾生既未曾生未曾死而又誰為資助誰受資助誰為設供誰是受供者須知盡十方虛空總來是一個金剛體本無生而不妨現生本無死而不妨現死其生也陽燄興波其死也空花落影到者裡道有生死不得道無生死不得正當恁麼時一句作麼生道以如意指云驀直去上堂云自古及今多少英雄豪傑都喫了等待兩個字虧若無等待兩字盡世界僧俗男女人人現成人人成佛久矣於今在家人上有父母下有妻兒只道等待父母百年婚嫁完畢方纔一心辦道出家兒既不養父母又無妻兒之累不過包裡幾分臭銅櫃裡幾件細軟皁裡幾個頭口便道等待我做幾日人方纔受戒方纔參禪誰知閻老子沒人情你要等待他卻不等待一旦差票到來受戒也受不及參禪也參不及可憐見要做人做甚麼人卻做了鬼也甘泉諸師一向聽板過堂十方雲水放包歇足大有叢林氣象爭奈戒法不聞何況禪道去歲清風監院因山僧一言輒領諸職事走大寧登壇受具可謂把手心頭便判底鐵漢子只是一班少年未免尚有等待昨因龍雨忽然而去始各著忙造衣底造衣買艸鞋底買艸鞋可見山僧以口說法不若龍雨以身說法也歷代聖賢無有不從緣發心者我佛如來為太子時亦因遊四門見老病死苦而後發心若肯從此發心即與諸佛同一正因還有愚癡底不但不能發心而且自生邪見決定道監院未辦道前常住卻安樂監院辦道以後病者病死者死卻反不安樂大眾世間那有百年不死底人今日雖存明亦難保只以及時辦道為是無父母底固應辦道有父母底更應辦道無妻兒底固應辦道有妻兒底更應辦道富貴底固應辦道貧窮底更應辦道但能辦道一切無有妨礙大眾努力趁時切莫等待下座上堂云有世界以莊嚴為佛事有世界以光明為佛事有世界以聲音為佛事有世界以寂默為佛事有世界以香飯為佛事接引者裡一切俱不用祗是行時行坐時坐睡時睡起時起食茶時食茶食飯時食飯撒尿時撒尿屙屎時屙屎且道個裡還有佛事也無若道有佛事未免辜負己靈若道無佛事又未免沈埋千聖畢竟作麼生昨日飯僧底張居士今日又領眾善飯僧來也大眾聽板過堂去下座上堂云孟夏儵云盡寒風不斷吹鴈恨回頭蚤魚驚見面遲嚼月泥牛噎披霜石馬嘶燈籠和露柱相向話凄凄話凄凄知不知拈拄杖云若也未知問取木上座卓一卓云咦下座酬經設供請上堂維那問三祖求二祖懺罪二祖道將罪來與你懺三祖道覓罪了不得二祖道與汝懺罪竟古人意旨畢竟如何師云兔角杖挑潭底月龜毛繩縛嶺頭風進云昔日婆子請趙州轉藏經趙州祗與轉半藏未審是那半藏師以拂子作圓相進云丁居士請和尚轉經和尚為轉半藏轉全藏人天眾前更請拈出師云南無觀世音菩薩進云祗如和尚適作圓相與趙州當日繞禪床一匝是同是別師云我與趙州同條生不與趙州同條死進云恁麼則丁居士合門增慶先世所有罪業一切冰消了也師云且喜闍黎共證明進云雄黃美酒三鍾醉白水菖蒲沁骨涼師云不須重註腳乃云大眾還識觀世音麼過去正法明現前觀自在止聞其名未觀其實至如經中所載得二隨順四不思議十四無畏十九說法七難二求三十二應種種威神種種誓願種種方便度脫眾生種種苦難成就無量無邊百千萬億河沙功德在觀世音分上祗是隙光片影欲識觀世音大遠在永嘉大師云不見一法即如來方得名為觀自在果其不見一法則法法全彰惟其法法全彰而實無有一法可得到者裏名無可名稱無可稱則念亦無可念無可念而乃不妨常念夫然後盡十方盡大地山河艸木鵲噪烏啼驢鳴犬吠以至風吹石臼雨打金鈴處處觀世音處處念觀世音謂觀世音念我也得謂我念觀世音也得謂觀世音念觀世音也得從劫至劫莫能窮盡而又何世間數量所能限耶卓拄杖云觀世音菩薩來也大眾聞麼復卓一卓云觀世音菩薩說法也大眾見麼且道現今說甚麼法觀世音菩薩道蓋州丁世榮居士是真念我不特自念我又請人念我不特請人念我又請座上老罪禿念我念念無有涯所求悉如意復卓一卓下座上堂云昔日百丈禪師當眾纔集即以拄杖趕下復喚眾眾回首百丈道是甚麼又黃檗禪師當眾纔集即以拄杖趕下復喚眾眾回首黃檗道月似彎弓少雨多風睦州和尚拈示云百丈不識好惡有甚麼共語處惟有黃檗猶較些子雪竇又道說甚麼猶較直是未在若是雪竇以拄杖趕下便休大眾你看他古人大家出一隻手盡力提持個事可謂陽春白雪唱逾高而和逾寡接引者裏眾集也不趕眾去也不喚一任他自行自止自繇自在只有問老僧要佛法底卻怪老僧不得何故老僧自來不敢贓污於人下座都寺元賦師慧祖衍編書記今羞今何錄
