body:
  text: 門徒比丘今廬今又重梓普說接引都寺領各堂諸師請普說師云佛門不是躲身之處既入佛門便當作佛於今出家人不特不知如何作佛而竟不信佛之當作徒然衣現成食現成君王當事而不事父母當養而不養且毋論妄行非法便能安分已是虛生浪死又焉怪世儒之輕詆我佛門耶山僧為儒時雖不敢詆亦嘗易視之以為是藏愚守拙之地後來遇我和尚睜開眼孔方知道世間更無有第二條路萬不得已將世間極難捨者捨之極難行者行之拚此身命求個著落常不輕菩薩道不敢輕慢汝等汝等皆當作佛假使盡大地有一個不當作佛他也不肯受人呵責受人打擲苦苦要說者話只因他實實見得除卻作佛別無可作為上底不能作佛必無以使下為下底不能作佛必無以事上父必能作佛而後慈子必能作佛而後孝兄必能作佛而後友弟必能作佛而後恭夫婦必能作佛而後可以處室朋友必能作佛而後可以成交必能作佛方成個人若是個人必能作佛盡大地直無有一人不承佛底恩力無奈他迷而不悟易經所謂百姓日用而不知也假使世間除卻作佛更別有可作山僧又何必捨難捨行難行決定向此門中拚身拚命耶於今出家兒現在佛門現稱佛子止信有佛不信作佛欲求世人盡信皆當作佛不亦難乎山僧初到者邊每向人題起作佛兩字無不大驚小怪縱有知佛是當作作佛是佛說不是山僧偽說然而不敢決定者果爾作得便好萬一作得不尷不尬被人抯著要索頂後圓光不特作佛不成反被他人恥笑不免慮得慮失所以屢進屢退我為汝設個喻子譬如人家生個孩子決定與他乳喫難道怕人恥笑道者個纔出胞胎底孩子知他後來長得成長不成便索性不與他乳喫不成又如學堂裡學生決定教他讀書難道怕人恥笑道者幾個學生知他後來中得中不得便索性不教他不成何況孩子實有成不得人底讀書實有中不得底若是作佛千個作千個成萬個作萬個成佛言吾為汝保任此事決不虛也又言聚心一處無事不辦若一心作佛又一心怕作不成又怕人恥笑眾念交攻所以成魔成病汝但放心去作更不愁作不成縱饒一生不成來生出頭來也少你底不得金剛種子遇便發生百劫千生永無壞爛倘或怕人恥笑似作不作則毋論後來沒有成日便是從前曾下種子可惜一旦拋撒諸兄弟作賊作龜子怕人恥笑為甚作佛也怕人恥笑若不作佛更有何作便拚是作佛不成也勝吹竹筒抱酒壺百千萬倍胡為不恥彼而恥此兩年以來信心頗熟不論僧俗老少咸知趨向然而入門來一日兩日便求速效卻似今日作了佛明日好回去料理家務一般世間百工技藝也無有一日二日學得底何況作佛最尊最大一件事譬如種稻最易見功也須春耕夏耘而後秋收有望寧有今日下種明日收割之理古來一聞千悟信有其人然而傳燈所載三登投子九上洞山與夫坐破七個蒲團者皆是極顯赫底宗師寧渠根器皆不如今人而今人反出古人之上良繇古人參是實參悟是實悟個個都是真實作佛漢所以不避艱苦必期親證親到而今人不貴裏面真實只貴外面光彩作得作不得且寬一著但學些子作佛言句好向人前賣弄我會禪我會道我是作佛底不見古人道但會作佛不愁佛不解語你果真實作得佛便一句佛語不會說也自不妨若只愛會說莫道趠些子現成語句便令一口氣說出三藏十二部又將一千七百則公案從頭舉了會了與汝自己有甚干涉古人得意之後閉口深藏舌二六時中只守閑閑地佛之一字尚不可得又那有許多甚麼禪甚麼道及其應機接物信手向自己寶藏中拈出些子自然活卓卓地不費纖毫氣力不是學得來底不是思量湊泊來底巖頭道一一從自己胸襟流出方與蓋天蓋地於今最可笑一等禪流但向六根門頭認著些子影響便道我已得根本智只欠差別智便一味學他古人機鋒轉語逢著人或咄或喝或揚眉努目或擎拳豎指或東一句西一句不管三七二十一如病狂相似以是為無滯無礙以是為古人妙用遞相傳授遞相模倣將謂作佛只如此殊可憐憫你看達磨昔日在少林面壁九年後因神光斷臂要求安心達磨只向道將心來與汝安神光道覓心了不可得達磨道與汝安心竟何曾有一點做作何曾費一點周摺六代單傳至曹溪祖師示人皆直捷簡要青原南嶽而後方纔各立門庭纔有機鋒轉語然猶是極直捷極簡要非如今人之胡亂撒屎撒尿不見馬祖問南嶽道非色相云何能見嶽云心地法眼能見乎道又問有成壞不嶽云若以成壞聚散而見道者非見道也又不見石頭參青原原問子何方來頭云曹溪原云將得甚麼來頭云未到曹溪亦不失原云若爾用去曹溪作麼頭云若不到曹溪爭知不失頭又問曹溪大師還識和尚不原云汝今識老僧不頭云識又爭能識得又不見僧問石頭如何是解脫頭云誰縛汝問如何是淨土頭云誰垢汝問如何是涅槃頭云誰將生死與汝又不見法常問馬祖如何是佛祖云即心是佛常便走住大梅祖令人探云和尚見馬大師得個甚麼便住此山常云馬祖向我道即心即佛我便向者裏住僧云馬祖近日又道非心非佛常云者老漢惑亂人未有了日任他非心非佛我祗管即心即佛又不見五洩初謁石頭便問一言相契即住不契即去頭據坐洩便行頭隨後召云闍黎洩回首頭云從生至死祗是者個回頭轉腦作麼又不見大珠參馬祖祖問來此擬須何事珠云來求佛法祖云我者裏一物也無求甚麼佛法自家寶藏不顧拋家散走作麼珠云阿那個是學人寶藏祖云即今問我者是汝寶藏一切具足更無欠少又不見藥山一日在石上坐石頭問曰汝在者裏作麼山云一物也不為頭曰恁麼即閒坐也山云若閒坐即為也頭云汝道不為不為個甚麼山云千聖亦不識山僧似恁麼舉直舉到來年也舉不了大都從上來真實見得底自有真實作用總不假借甚麼奇言妙句不過就他來處直下指出或輕輕撥轉那學人真實見得底便直下承領或就機翻身又何曾別有一點做作又何曾別費一點周摺至如大愚之為雲峰悅大慧之為謙禪更不須一言半句便知他千了百當總之到真實田地有言句也真實無言句也真實乃至下咄下喝也真實不下咄不下喝也真實揚眉努目也真實不揚眉努目也真實擎拳豎指也真實不擎拳豎指也真實斷斷不似於今人一味胡做亂作直是善因而成惡果諸兄弟貴實不貴虛汝既到者裡俱是夙世善緣汝但辦一片決定心長久心切不得怕人恥笑不得要求速效一切時中提起本參真實參將去汝但得一分力山僧便識得一分但得兩分力山僧便識得兩分切莫得少為足不肯前進作個半截底人何況半截尚不得只管要求印證若印證了爾不特誤爾一生直誤了爾千生百劫不得出頭不是小兒戲諸兄弟你若到真實透頂透底田地便沒有一人印證亦自何妨若未到者田地必求到者田地決不得捨此別求捷徑縱饒爾一生念佛真得往生親見彌陀也只是教你向者一路更無別路若使盡大地尚有一路可以便易作佛山僧自不肯拚捨身命專向個裏求個著落而又何苦區區勸爾諸兄弟耶諸兄弟只恁作去不愁不成久立珍重師云寬本禪人行腳回曾從海州見老僧茲聞老僧在永安盡傾衣缽來此辦供請山僧為眾普說學道難成之故佛在世日百人學道百人成道末法時代學道者多成道者少虛實之間耳於今學人誰不道我是實然而止知求解不知求悟悟之與解似則甚似遠則甚遠譬如葉公所好之龍頭角鱗甲非不酷肖要令興雲作霧得麼又如兩人在此一人曾從長安來一人止聞人說長安其親到者任舉一事一物自然親切其未到者非不極談宮闕之嵬峨城郭之雄固人事之繁華貨物之聚集識者已知其不實也每見有從法華得解者便靠定法華決定侈談如何是開佛知見如何是示佛知見如何是悟佛知見如何是入佛知見非不詳悉洞達但令離卻經文直下拈出畢竟喚甚麼作佛之知見遂乃茫然失措有從華嚴得解者便靠定華嚴決定侈談如何是理法界如何是事法界如何是理事無礙法界如何是事事無礙法界亦非不詳悉洞達及乎反按自己理上尚似打得過事上便打不過又何況理事無礙又何況事事無礙耶有從楞嚴得解者便靠定楞嚴決定侈談七處徵心八還辨見若離前塵分別畢竟喚甚麼作真心見猶離見見不能及畢竟喚甚麼作真見直得無言可答無理可伸至於從維識得解者便靠定維識從起信得解者便靠定起信種種不一門庭各立互相矛盾且勿論經教中人便是宗門下衲子不求實悟比比皆然或見古人苦功處便走向禪單咬著牙關捏著拳頭豎著脊梁恰似裝羅漢形像希圖與他妄想抵敵尋常未上禪單時妄想尚少纔上禪單妄想愈熾毋論抵敵不住縱得暫時停息如石壓艸石去而艸還生或見古人透脫處便謂妄想不足畏妄想無體不須禁遏一味隨緣放曠任性逍遙不幾莽莽蕩蕩招殃禍耶又有道妄想雖不須禁遏亦不可放縱但時時鑑照不怕念起只怕覺遲是則甚是我且問你白日裏鑑照則易睡夢裏如何鑑照又何況一口氣接不來時總未免業識茫茫去也又或從古人良久默然處作解者便認未開口以前為威音那畔為父母未生時面目為空劫那邊事纔見開口便謂落第二頭錯引臨濟入門便喝德山入門便棒謂待汝開口堪作甚麼一向把住以為極則殊不知正坐在黑山鬼窟裡所謂死水不藏龍又有認古人言句如乞師安心便道將心來與汝安乞師懺罪便道將罪來與汝懺如何是祖師西來意便云西來無意或云何不問自己意以為扣機以為綿密以是為禪道者又有嫌此等為合頭語一任指東話西便又錯解古人庭前柏樹子青州布衫乾矢橛麻三觔之類以為不上他釣竿不入他圈繢以是為禪道者又有道此事不在言說亦不在無言說但見人問著便努眼相視或擎拳或豎指或一拍一喝以為真體顯露以為應物無滯得大自在得大解脫此種更是難救又有認現成一切便錯解古人山是山水是水僧是僧俗是俗拄杖子是拄杖子耳朵兩片皮牙齒一具骨師姑元是女人做一類語話以為直下便是更不敢動著一毫頭又有專一杜撰奇妙尖新之句攢花簇錦鬥豔誇多尤是末流大弊總之不曾有實悟未免隨處粘著汝莫聞恁麼道便謂我一切不粘著便是祗者不粘著又是一個大坑塹若是實悟底人總沒有你捫摩處汝纔向者裏覓渠渠卻在那裡汝纔向那裡覓渠渠又卻在者裡有時恁麼道有時卻不恁麼道怪不得時人喚渠作轉車軸底嘴渠本不曾有一點實法教人不見道若將實法與人土塊也消不得岩頭和尚又道纔有所重即成窠臼眾中莫有出得窠臼底麼若有老僧即將法座讓他不然大家歸堂仔細參究畢竟要求實悟不可徒然學得一知半解以自滿足生死到來抵敵不住卻怪老僧不道你但自己打算於今學得底果然敵得生死即是真正更不須問人成得成不得也大眾久立珍重普說李居士請普說士問和尚所以為禪流者至矣歷來士大夫學道多不得力病在何處更希微細拈出師云士大夫學道之多無過於宋病痛之多亦無過於宋妙喜老人作大醫王藥料具足設方救療切中病源至今讀其書問所載業已不留後人以餘地矣然昔之所患未必全今之所患而今之所患或甚于昔之所患嘉隆以前士大夫留心斯道者其言行不大顯著雲棲紫柏憨山三老道法盛時士大夫多與之遊令一時學者知我佛道淵廣而宋儒迂拘未足盡信三老之功不可誣也然其所嘗親炙者或始甚專篤而其後未免流於他端緣無始帶來一點習氣未能自割況富貴場中佳麗易致漸染漸深纏綿不解迨及暮年功成名遂唯此一事更無他務奈精力衰耗齒落髮枯當驕奢淫佚之日又參以貪生怖死之念不得不假性命雙修之說此說一倡如蠅附糞以為既可延年又堪恣欲七幅羅裙不知罩卻多少英靈漢子若其正信不移亦略可數或博探教相或深窮止觀或依傍淨土亦有夙具靈根專茲一路其自任非不的確其示人非不明快亦以者一點習氣鏟除不易初或暫容轉且縱肆乃反借口如好好色之文以自掩飾業力日強道力日怯目前作主不得未免東牽西合臨命終時毫無得力蓋因打頭不遇作家即遇未經惡辣鍼錘自恃聰明以致於此殊可痛惜自壽昌博山雲門黃檗天童諸老後先開法宗風弘鬯而天下咸知趨向登其門者不可勝數求其全身放下終始於斯之士夫亦難屈數指乃有發心真正虛懷參訪其頓斷繩索自甘淡素可謂難信能信難行能行亦以聰明過人雄辯橫溢究其實落得力之處不過日坐得一兩炷香妄念不起而已亦有習靜山中一七二七直得身心世界內外通瑩所謂坐斷十方而不知密移一步遂遇邪師謬為證可自此狂慧勃發到處鼓弄唇舌雖見真正宗匠容易放過歲久月深無可依據又以弘法念重專求顯異致種種幻見稱神道鬼者又有最初便遭邪師誑惑不復博參明達而徒以自己隙光附會前哲謬計古來不過如此任情恣意隨順塵勞復於隨順境中高談快論謂煩惱即菩提無明即大智但見有稍自簡束者便指為兔徑小節平昔習氣有增無減此道易學此類最多又有深知其非力事禁遏無奈猴猿子不死愈禁遏愈起轉而從事於誦念禮拜以祈降伏者是皆極奇極顯四眾共推為宗門樑棟所以為外護則無不極其至矣大都士人從小入書堂父母所囑師長所訓莫不以位高金多為第一義所謂上大人時錯了也何況婚宦而後世累日深世情日重保榮固寵之弗暇若夫超出倫輩或學問自侈或文章自命或風節自高或經濟自任有一於此皆足以揚名當世垂之來祀人生大事如斯爾爾豈真有前因後果輪迴升沉之說儒教中雖微示福善禍淫而未深明三世之旨淺腐之流遂疑死後斷滅見落邊邪遞相承襲倚程朱之門戶拾韓歐之涕唾竟不知儒者何道而徒以闢佛為儒不闢佛則不得為儒以是衣冠中多置內典而不敢閱其一二稱信者或妄希現福為保護身家保護兒孫計又或仕路蹇厄或遭不如意事處無可如何之際不得不懇佛求佛而又恐人謂其佞佛輒自解曰亦聊借以消磨雄心比比皆然上焉者亦不過廣搜詭異以拓見聞采掇玄奧以資筆舌非真究心佛乘也故有稍知趨向者吾門中人便視為麟鳳外護為念安能痛加鍼砭如紫玉之於于頔兜率之於無盡所以半途者多到家者少如前所舉諸老不特稍知趨向且能真究真參實實為此一件大事而特不能如古人全身放下久親法席以致入處草率得少為足不過種下般若根株雖然百劫千生埋沒不得而欲其一踏到底不敢謂絕無其人實千難而萬難者也我佛涅槃會上以正法眼藏付囑國王大臣法華經言治世語言資生業等皆順正法又言應以宰官身得度者即現宰官身而為說法又何常專以易屬出家兒而以難屬士大夫耶額屠兒放下屠刀云我是千佛一數龍女八歲獻珠成佛教有明文曾堂堂士大夫而竟一屠兒一女子之不若耶況傳燈紀載如唐之裴公休陳公操宋之李公遵勗楊公大年輩不可勝數是皆據高位握大權未嘗壞世間相而求實相離生滅法而求寂滅幸有如此體格寧古之必勝於今今之必不如古而罪禿謂其入處艸率得少為足者非其知慧淺薄初無定見也亦非其力量有限自甘中止也處此火宅中苟無大智慧與大力量安得不為名位貨色所拘遽爾抽身向個中求入路耶正因其知慧大力量大所以纔入門來見宗師開口不難領會不難荷擔及閱諸經論與諸祖公案可以解路通者自不費力其不可以解路通者亦不難以平日讀書作文伎倆多生穿鑿祗圖解得分曉說得明白解不分曉說不明白便生煩悶百般思量百般計較或得些子醒發或得些子輕安便求宗師為渠印證主法者恐折其萌芽阻其向往稍鬆一著渠便自任為極則以為究竟如是縱遇他知識連道兩個不是定忿然謂是強移換人不見無盡初見東林便蒙許可及到兜率觸翻溺器方始撇地而後來歷參諸方又不知受卻多少錘鑿張公是何等知慧何等力量而況其次焉者乎要學此道必須發個狠毒將無始來一點習氣千難割萬難割處痛下一刀如破竹頭一節節節皆破一切纏縛不得然後取古人一則機緣不妨向沒可思量處思量沒可計較處計較到思量計較盡時平生伎倆一點也用不著莫生退怯莫求功效正好拚命與之廝捱勿道全無所得即有所得我亦不愛勿道全無人肯即有人肯我亦不顧忽然失手摸著娘生鼻孔方知元來只在者裡一切經論一切公案不求分曉無不分曉不求明白自然明白以此自利以此利人以此事親則為孝以此事君則為忠出得世間入得世間而又何僧何俗何儒何佛到恁田地佞亦得即闢亦得博山先師翁常道汝等若了得便作個衛元嵩也不妨不見近代陽明龍溪近溪諸大老不特不肯毀形體絕祭祀作名教中罪人亦何嘗拘拘標名外護但為真儒即為真佛必為真佛始為真儒文章風節學問經濟無不在此不然縱爾烜赫一時名垂後世反之自己身心全沒交涉生死到來依舊業識茫茫無本可據直謂之無智慧人無力量人已矣罪禿自知此事以來每喜與士大夫遊雖時時以此事相激發然未敢深談及此不意絕漠餘生乃得遇老居士真是個漢既承至誠相叩不復隱覆不怕忌諱將平昔親聞親見親歷者盡底傾出其餘微細種種病痛自有妙喜老人種種神方種種良藥在果爾一踏到底且無道可學又何病痛之云倘其半信半疑欲前且卻則並無病痛之可指至如陰竊先哲之緒餘假張學道之旗幟招羅少俊私立朋黨以致荊棘叢生戈矛互起國家之敗蔑不繇之是又無藥可療無方可治妙喜老人誠不料末世士大夫決裂遂至於此李居士不覺欷噓涕下命筆紀之以為士大夫學道者鑒茶話住大寧寺至月十四晚設茶為西堂祝壽師云明日是西堂降日期主設茶請大眾為西堂預祝大眾且道西堂四十二年前正當今晚在甚麼處安身立命你莫道正在母腹中麼比如未入母腹時又向甚麼處安身立命若向個裡具得隻眼莫道四十二年前四十二年後便從無始劫初直至盡未來際與大寧今晚團圞總沒有兩個時節總不曾移易一絲毫頭恁地見得分明則期主者一杯茶不特為西堂一人祝壽直為現前大眾祝壽又不特為現前大眾祝壽直為三世諸佛大地眾生一同祝壽了也若猶作世情論量縱饒你活到一百壽一千壽總喚作守屍鬼魂不散底死人祖師有言汝等見聞覺知之性與太虛空同壽道德經云死而不亡曰壽儒教中又言殀壽不二你看從古聖賢又何曾認此幻化身心作壽雖然你道離卻此幻化身心又向甚麼處祝聻堂主進云夜靜更寒請和尚食茶師拈茶碗云請三十晚設茶師云今日是年窮歲盡之日本剎住持設茶與大眾分歲大眾若有收藏底陳腐佛法知見一齊抖擻出來好得乾淨過年山僧也有一則陳腐公案不免趁時拈出昔日潭州和尚有言山僧宰個露地白牛與你眾人分歲維那入室云外面有公人拘和尚州云作麼那云和尚私宰不曾納蹄角州以帽擲地下那拾帽州下床扭住云賊賊那以帽覆州頂云時寒且還和尚即出州顧侍者云今晚公案如何者云潭州紙貴一狀領過大眾你看古人大家恁地分歲好生熱鬧今日山僧也有個沒毛癩狗不敢贓污了常住鍋灶整整將來供養大眾且問大眾向甚處下口眾下語不契師顧眾云莫將爆竹驚山鬼留取荒城伴罪夫初六晚住持設茶請茶話師云明日是首山和尚誕日住持設茶請山僧領大眾預祝現前堆積珍異都是住持孝心蓋為將來乞戒地也山僧不可借花獻佛只可別尋個物事為敬良久云者件物非青黃赤白黑非色非心非有非無非因果法是個甚麼物大眾若識得者物便不用別尋各人現成將出來非特可為首山和尚壽且可為諸佛諸菩薩壽又非特為諸佛菩薩壽且可將諸佛菩薩底壽全歸首山和尚又可將首山和尚一人底壽散為現前大眾及法界一切眾生壽首山和尚莫笑道你為甚將我家裏物來送我卻又亂作人情待明早天明起來領大眾與和尚禮足十四晚茶話師云山僧所有一切好法惡法都被爾們抖擻乾淨今晚要得半句口遍搜不獲且請大眾食茶食果子食了大家看燈不見道春宵一刻值千金大眾不得錯過住接引寺五月十四晚設茶師云山僧初來者邊見者邊家家糧米豐足只恨不曾有人開個飯店彼時恥若書記便發心作個店小二也有笑他底也有憐他底憐他底只愁生意淡薄枉費辛勤笑他底道阿誰家裡缺少麵觔木耳那得餓不死底漢來喫爾者般茶飯不期南塔掛起招牌一直賣到遼陽於今又賣到海州來了明日是恥若生日者裏一班都是後起底店小二特搜店裡殘茶剩飯請山僧預祝但凡嘗著者般滋味底個個都要續佛慧命諸佛慧命無有窮盡則恥若之壽量無有窮盡又何用別為祝耶問答臘八日書記入禮師問釋迦老子當年睹明星悟道畢竟悟個甚麼進云火師云恁麼則不悟也進云煖氣烘烘記復舉前話問師師云今日冷似昨日復進後語師拈禪衣角一抖湧光出問云未審睹明星後與雪山六載前是同是別師云可知禮也進云何苦如此師云水滾下茶來少頃座元入禮師舉前問元云銅盤師云恁麼則不悟也元拈火箸插盤中師云且道睹明星後與雪山六載前是同是別元一喝師云放汝三十棒西堂舉外道問佛不問有言師云不是不是進云舉猶未畢為甚便見不是師云再犯不容座元問趙州不食投子蒸餅卻禮沙彌三拜意旨如何師云汝不妨疑著又問趙州畢竟向甚麼處勘破臺山婆子師云汝曾見孩子趨氣毬麼靜宇問應持菩薩上觀三十二恒河沙如何不見佛頂師答為他向高遠處覓又問三千世界俱壞未審大地眾生向甚麼處安身師云好個消息又問弟子生死到來將何抵敵師云你於今從北塔到南塔為甚不問啟如問車損牛老載重如何過得峻嶺師答看腳下又問日中看瓜架夜後聞鐘聲時如何師云隨緣消舊業更莫造新殃罄光問如何是學解信解悟解三種解作麼生師答你有許多般解麼座元問三界一心發火宅是吾家百億須彌山至今疑著他師答為他閒事長無明進云原來無一法諸法體如如師云切忌向這裡著腳道菴問行住坐臥即不問未審睡著時在那裡師云你即今是醒是睡祥光問一切儼然教弟子作麼生會師答用會作麼又問一切音響落在何處師云向未開口前看取德光問本來面目人人本具為甚學人不知師答祗這不知莫別尋壽績問婆子道趙州只轉得本藏畢竟如何轉得那半藏師答山僧也不奈伊何又問大海水為甚一日兩潮師云晨鐘暮鼓又問天上月為甚半圓半缺師云適纔喫飽了於今肚又饑輝光問終日奔奔波波一旦生死到來將何抵敵師答你喚什麼作生死又問如何是透法身句師云吹螺打鼓恥若問眼在頭上為甚自不見眼請師點出師喚恥若若應諾師云點出了也又問世出世間則不問如何是學人自己師云高麗國好大扇又問南塔既在地上為甚卻向龍潭裡放光師答云家家門前火把子桂菴問如何是學人本來面目師答是誰叫汝恁麼問弘掀問某甲初出家時只以念佛誦經為本到此卻靠不得請問如何是第一件大事師答屙屎撒尿進云四大分散時如何是了手師云分散且置汝即今喚甚麼作四大進云參禪人了生死未審還有輪迴也無師云日沈西水流東淨如問來此作飯供養大眾圖報三世深恩未審還報得盡也無師連彈指三聲崑璞問生死如車輪子相似如何止得師答問取推車漢屍林問曹源一滴則不問華首溪頭事若何師云混同江闊多少又問羅浮隱居瀋陽出世隱居且置出世一句作麼生道師云風沙萬里進云風行草偃水到渠成除此不問如何是逆波之句師云瀋陽好香瓜又問大事未明如喪考妣為甚大事已明如喪考妣師云太平本是將軍力不許將軍見太平又問未離兜率已降王宮未出母胎度人已畢為甚我等不得成佛師云誰教汝要成佛道心問終日承十方深恩己事未明如何了得師答熱灶著一把冷灶著一把仰泉問母胎生下時佛性已具為甚麼不會說話師答呱呱又問生死到來將甚麼抵當師答你即今拈匙把箸又作麼生都寺問世尊說法有六種成就未審和尚種成就師答全仗闍黎心力進云世尊道四十九年未曾道著一字為甚麼又留三藏十二部師云事也須件件周到始得小沙彌問我有喫的狗也有喫的未審我是狗狗是我師答云大眾看者孩子作師子吼彌無語師便打出淨空問四大分離向甚麼處安身立命師答牛頭獄卒是甚麼人又問無心道人又向何處用工師云饑添缽寒添衣桂林問清晨靜坐聞鐘聲犬吠未審是同是別師答問取山前石人去維那問檀那一粒米重如須彌山未審此恩如何報得師答點一柸苦茶來晒衣次問學人平生不曾挂一寸絲且道晒個甚麼是得師云你即今身上披的是驢皮是馬皮又問古人道眾苦不是苦袈裟下打失人身方是苦學人現是人身且道是苦不是苦師答你問阿誰又問現前作是主醒時作得主睡著時作麼生師答賣油郎逢渠問如何是祖師西來意師答云西塔較南塔多少光宇問學人識得木石木石為甚不識學人師喚光宇宇應喏師云汝不是木石進云行住坐臥不離者個未審如何是者個師云行住坐臥又問弟子到來六十餘日並無增減未審如何即是師答來說是非者便是是非人進云闇裏明珠放去收來時如何師云修行人為甚將常住物作自己用擇菜次恥若問菜上蟲不從天降不從地湧為甚有情向無情中出師云猢孫倒上樹都寺玄賦編書記今羞錄
