body:
  text: 門徒比丘今廬今又重梓小參小參舉祖偈云真理本無名因名顯真理受得真實法無真亦無偽大衆須是受得真實法方才説得箇無真無偽於今學道人不論在家出家尚未望見門頭戶底真偽不分邪正不辨便開大口説無善無惡無因無果無生死無涅槃無菩提無煩惱上無諸佛可成下無衆生可度才見人作善布施便道是有漏福田見人坐禪念佛誦經禮懺便道是有為功行恁般説話卻也好聽祗恐爾啼哭有日在祗恐閻羅老子不怕你會説鑊湯爐炭裡煎熬有日在何故只為爾説得行不得只為爾現前業鎖打不開自心上塵垢纖毫洗不淨作麼生容易開大口六祖大師云口説心行則心口相應口説心不行如夢如幻如露如電昔日白香山參鳥窠禪師請問佛法窠云諸惡莫作衆善奉行山進云三歲孩兒也説得窠云八十公公行不得諸善知識此事不是説了便休山僧者裏論實不論虛參須實參悟須實悟不可學些語話便恁麼度日辜負了十方檀那同本剎長老心力諸善知識切須仔細雖云即心即佛唯證者方知澄觀國師有言然有證有知則慧日沉沒於有地若無照無悟則昏雲掩閉於空門果其一念不生前後際斷如雲開月現如杲日當空盡山河大地實無有一物與我為緣為對到恁麼田地方許道無善無惡無因無果無煩惱可斷無菩提可求無生死可了無涅槃可證上無諸佛可成下無衆生可度十方蕩蕩蕩蕩十方咄且止且止祗如不落二邊一句作麼生道以拂子拂一拂云駱駝頭搶地蝦蟆腳指天下座韓文恪公諱日設供拈香禮拜畢升座云蒼天蒼天蒼天復拍掌云呵呵呵大衆且道哭底是笑底是若道哭底是便從威音王未生以前哭到今日也哭不了若道笑底是便從今日笑到樓至佛滅度已後也笑不休正當今日合作麼生不見道笑啼俱不敢方信做人難山僧四十二年前不知是何嘴面居何國土無端被業風吹向廣東博羅城內韓氏門中父諱日纘母車淑人兄弟姊妹共是九人彼時父母俱存兄弟無故合家歡聚共享榮華不幸先君於乙亥五月十八日在長安謝世山僧奔訃途中便見得人間世半點也靠不得遂決志向此門中求個下落甲申八月先慈見背一姊兩妹先亡尚餘一姊一妹三弟俱各無恙臘月提杖出門含淚相送猶冀行腳歸來重相會晤不料寄迹石城惹出一番絡索孤身萬里音問杳然去年五月內蒙本師示札方知博城十不存一僅留三弟一身今年四月育子遠來又聞三弟遭戮合族蕩盡據世眼觀從前好生快樂今日好生悽慘殊不知正眼看來總是一場春夢一旦夢覺卻來計較道前半夜得箇好夢可惜後半夜卻得箇惡夢豈不大癡大愚麼若向箇裏覷得破不特人間世一切榮枯得失死生聚散了不可得釋迦彌勒並屬空花文殊普賢如同電拂便從威音那畔那畔數到樓至最後最後總是一場春夢夢既是夢覺也是夢好也是夢惡也是夢笑也是夢哭也是夢現今山僧説底也是夢大衆聽底也是夢咄夢話且止今日正是先文恪公諱日山僧要學世人請幾位長老誦幾部經拜幾部懺爭奈懺也懺不盡誦也誦不了不如權借虛空為磬須彌為椎便請琉璃惡王領事更煩牛頭獄卒揚幡刀山劍樹作大道場血海肉山聊當供養仰憑現前大衆將三藏十二部異口同音高聲朗誦一過專為追薦先君韓文恪公先慈車太夫人兄弟姊妹合族先亡十方界內一切屈死孤魂同時往生極樂去也遂舉手合掌云今日天暑有勞大衆下座小參云古德道明得自己不明得古人名為有足而無眼明得古人不明得自己名為有眼而無足若據山僧看來明得自己不明得古人正是有足底跛子明得古人不明得自己正是有眼底瞎子於今大地參禪人者兩種病最多每見聰明伶俐底只道涅槃心易曉差別智難明一向在古人因緣上東卜西卜只要去明他莫道明不得就饒爾實實明得到自己分上卻作主不得不見當時有個禪人久在南泉斬貓兒處留心忽遇人指他道爾只管理會別人底貓兒卻打失了自家狗子者漢方才瞥地又有那一等向自己腳跟下覷著些子便一把捏住道更無別有任人問甚麼淆訛公案他只舉起便會了一味強作主宰或豎一拳或喝一喝或繞一匝及乎細細地勘他卻又黑漆漆地似者般底更是難救山僧不惜眉毛盡情向你道三世諸佛歷代祖師並不曾有別底言語只是要你明者一著子豈有明得者一著子反於古人言句上過不得底既於古人言句上處處過得乃反於自己者一著子又不得明了之理山僧不道你全無氣息只為你趠得些子便自為足不曾到那實證實悟真實不疑之地若到得真實不疑之地古人即是自己自己即是古人古人外無別自己自己外無別古人自己古人一齊拈卻又説甚麼明得明不得畢竟如何卓拄杖云唵啞吽下座小參云金佛不度爐木佛不度火泥佛不度水真佛內裏坐大衆且道喚甚麼作真佛內裡的是真外面的是假麼你莫要錯會趙州言句有一等見識世間種種盡屬幻相祗有那無形無相不動不變底一著子始名為真一向坐在空寂寂地不敢動著一毫有人問著睜著眼閉著口喚作世尊良久喚作維摩默然又喚作威音那畔消息又喚作楞嚴大定殊不知死水裡淹殺人無數所謂陰山鬼窟裡作活計大慧當時不惜惡口痛罵為默照邪禪斷佛種性又有一等怕落空底便認現今開口動舌底為是見人舉一切公案盡情抹殺庭前柏樹子是誰説來麻三斤是誰説來乾屎橛是誰説來傅大士曾有一偈末兩句云若識佛去處祗這語聲是此語開發人極多誤賺人不少你一向認者語聲為是未開口前又喚作甚麼如今者般禪客極多正是認奴作郎不見道學道之人不識真只為從前認識神無量劫來生死本癡人喚作本來人又有一等見人恁麼道便云者般也不是那般也不是我卻一切不認便恁麼去時莫便是麼正是業識茫茫無本可據山僧者裡總與亂棒趕出無你站腳處畢竟如何即得良久顧左右云衆檀那回去瀋陽莫道山僧在者裡惑亂人家男女下座師誕日小參師云金剛經言一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出未審喚甚麼作此經衆中有曾見此經底出來對衆宣説山僧為汝證明一真從地上拈一莖草置法座云請和尚鑑師云山僧從來不曾見此經進云學人從瀋陽得得而來師云瀋陽底且置即今大寧一句作麼生道真禮拜云謝師開示師一喝慧光出禮拜起拱立師云答汝了也進云如何是佛法大意師便喝進云喝者是甚麼人師云衆眼難瞞光又理前問師又喝十方出禮拜起云嶺上梅花權當供養師云退後三步方退三步師云隨聲逐色漢進云寒風匝地師一喝復云還有見此經底麼若論你諸人個個都見此經個個都説此經只是説得此經小注説不得此經本文山僧記得四十二年今日以前眼中常聞此經耳中常見此經手中常誦此經口中常書此經常為一切土木竹石狸奴白牯宣説此經正當四十二年今日今時墮下地來半字也記不得雖然記不得卻不曾離了此經懷抱中啼哭也是此經食乳也是此經後來學行也是此經學話也是此經學書學禮也是此經迎賓送客屙屎撒尿乃至穿淫坊入酒肆無不是此經到了二十八歲忽然被個牛頭馬面底惡人誑惑道此經爾已失卻多時了也把鬚髮驅了去前不迭村後不迭店直得淹淹一息及乎緩緩地蘇醒把手向鼻孔裏一摩依舊只是此經從此已後更不疑著此經誰想此經能造大功德也能招大禍害夾也是此經打也是此經入牢入獄也是此經充發到者裏來直得一物也無卻不曾失了此經爭奈一向未得拈出今日不敢隱匿不免讀誦一遍大衆諦聽諦聽良久卓拄杖云爾時拄杖子欲重宣此義而説偈言剩長老為甚麼謬説此經下座空和尚誕日趙居士設供師至筵前拈香禮拜起立座側維那出問四回出世權衡佛祖號令人天未審承誰恩力師云座上老漢答汝也進云恁麼則無邊剎海自他不隔於毫端為甚諸人不見不聞師云為伊有耳目在進云春風融和壽筵特設爐煙縹眇燈燭輝煌岡陵松柏拈放一邊如何是知恩報恩一句師云三條大木夾不死卻來塞外撒泥沙進云不入驚人浪難得稱意魚師云更與一把那禮拜師乃指法座云者老漢眉端挂寶劍袖裏有金鎚金鎚擲處虛空碎寶劍揮時佛祖愁記得十六年前函可是個俗漢自從雙柏林一見輒不避危亡抵死相依隨往匡山住小歇場後過歸宗復還華首數載巾瓶將謂終身不離誰想業風飄散老漢飛錫八閩函可放逐遼海相去萬里一別十年中夜思量涕淚冰結六祖大師云東方人造罪想生西方西方人造罪想生何國於今法令森嚴關門阻隔函可想到閩中覺比西方更遠十倍又安知老漢之思念函可不尤甚於函可之思念老漢乎今日適值老漢壽誕函可欲備瓣香杯茗爭奈瓢鉢空虛無衣可典幸於千山會趙居士便發心代辦壽筵何況廣羅珍錯上供佛天普齋海衆下及六道群品以此功德遙祝我上空下隱大和尚少病少惱不怖不驚常住世間普利一切即以普利一切無邊功德回施趙居士福壽併增合門康泰復成一偈不見慈顏已十年漫將家醜極邊傳瓣香遙祝知何處滿地春風鋪緑氈下座小參師云善慶惡殃三教聖賢如出一口然驗之事有不盡然者積善之家往往有不如意事屠兒劊子反得夫婦齊眉兒孫滿眼顏回夭壽盜跖長年千古所以致憾也我佛如來通言三世此理昭然譬如種樹一般今年種樹必待數年開花結子焉有今日才種明日便望果子喫惡人而得善報者緣其今生所作惡業尚未成熟而前生善業已熟故一旦福盡禍來長劫受苦善人而得惡報者緣其今生所作善業尚未成熟而前生惡業已熟故一旦禍去福來長劫受樂爭奈世人只見得現前一步地就如金檀那父子一向好善近益精進昨日同來戒壇聽法家中一孫四歲而殤那愚癡底決定道渠未食齋時子孫無恙剛食齋卻少了一個則是善必不可為而酒肉必不可斷也殊不知者孫子或是他多生仇怨故來害他今見他父子精進明知害不得只得飄然而去又不然便是他善知識特來他家詐現生死令他覺悟恩愛幻夢一切了不可得去歲甘泉諸師聞山僧言咸發心受具及至臘八龍雨忽然退後山僧甚疑之不期前數日一病而亡一時聞者共生驚怖而金氏之孫又復夭折始知人命呼吸幼亦死壯亦死若不及此預辦更待何時庶幾已發心者心愈堅未發心者心益切則是金氏之孫與龍雨兩人所謂以死作佛事者今日金氏父子前來設供全無戚容足見渠父子業先受度山僧特為表出使知渠兩人之死度人無量縱有多生夙障又安有不立地超拔者乎雖然倘有個頂門具眼底向前道者兩人不特現未曾死昔本不生則山僧一段絡索也不消得何故花開復花落春色自年年下座小參舉六祖大師云心平何勞持戒行直何用修禪於今者些瞎禿子不識祖師言句都疑祖師為甚教人不持戒不修禪因辟檀經為外道偽撰殊不知恁麼説話正是真實教人持戒真實教人修禪也我且問你於今持戒有幾個心平底修禪有幾個行直底蓋心本自平你才有心求平蚤已不平了也行本自直你才有意求直蚤已不直了也大衆此事不論出家在家人人腳跟下有條極平坦極徑直底大路祗因你自不反顧卻向外馳求所以極平坦處反無端生出許多坑坎極徑直處反無端生出許多橫邪諸佛諸祖沒奈何設種種方法教你持戒教你修禪總無別意不過要你還歸舊時極平坦極徑直一條大路而已不見釋迦老子昔日華嚴會上只度得一個童子法華會上只度得一個八歲龍女涅槃會上只度得一個廣額屠兒你看他三個何曾持齋作善友來何曾出家為僧來又何曾持甚麼戒修甚麼禪來古人幸有如此成佛底體格何不學取彼既丈夫我亦爾我何歉於彼哉大衆不要向外馳求你但自己回頭轉腦直下識得便休你若直下識得不求平而自無不平并者平字也不消得不求直而自無不直并者直字也不消得何故心本無心心本無心則終日行而無所行既終日行而無所行又有甚麼戒可持禪可修耶雖然也須實到恁麼田地如其未然大須精嚴持戒真實修禪始得下座小參云古者道者一片田地分付來多時也我立地待爾搆去於今莫有搆得底麼你若搆得才不辜負作佛祖兒孫那等不肖底拋撒家業孤露他方且置勿論有一等牢牢守著一張印契雖則四至分明爭奈多劫以來被惡賊侵占已盡大衆者個惡賊也不是別人祗為爾自己作主不起家親為祟山僧今日為你作個公斷斷還與你祗要你諸人自己一一踏勘非但今日從上來諸佛諸祖出世也只為你作個公斷不見臨濟入門便喝德山入門便棒到者裡才起纖毫頭意想蚤被他侵沒了也大衆不用思量便恁麼一眼覷著一腳踏著平坦坦安貼貼直得釋迦彌勒拱手歸降文殊普賢退身三步何況以下一班毛賊縱饒他擎頭戴角舞爪張牙萬種施為千般伎倆總不消一捏然須是實實識得他破如馬見身影知從自身所出自然不驚不怖不則強作主宰心窩裡小鹿兒已撞了七八撞也大衆不用驚疑是你各人自己田地快些搆取好下座小參云諸佛出世專為救病生有八萬四千病佛有八萬四千藥因病發藥而又執藥成病所以後代祖師藥日益多方日益變總期愈病而止於今學人不察古人救病之意不詳究起病之因但學得一二方子便向門前挂個大大招牌就如醫士止識得個補中益氣九味薑活便不管他寒熱虛實一味教他喫不特不能除病反能增病縱然撞采得些效驗而其所傷則已多矣山僧是久病之人所謂病多諳藥性然到者裡一味也不用雖然一味不用但逢著病人又不得已信手拈將些子只要肯服不愁不效張居士一場大病呻吟床第偶發一點信心病遂輕減今日乃同衆信前來設供不信是病信即是藥者一味藥不特能愈自己之病兼能愈諸人之病又不特能愈諸人一生之病且能愈諸人千生百劫必死之痼病又何況現前四大些微疾苦而有不立地除盡者乎且道盡後如何卓拄杖云色身永安康信心長不退小參云生我法身者佛祖生我色身者父母父母之恩等於佛祖世人不思父母生我劬勞而每於我生之日居然稱慶甚且廣羅珍錯多傷物命習俗皆然恬不為怪獨不念異類殊形彼此性命奈何以我一人之生而致彼多物之死我生可慶彼死不足悲乎梵網經云我生生無不從之受生六道衆生皆是我父母而殺而食者即殺我父母亦殺我故身是不特背負一生父母之恩而且陷害多生父母之命又不特陷害多生父母之命而且陷害自身感報現生多諸傷殘古者道仁者壽即不仁者必不壽也舉世干戈不得寧息咸此之繇世人不察其繇而反厭聞此語山僧為儒時亦曾嗔人道你何曾比豫於畜生而況以畜生加我父母哉不知此乃諸佛誠言只因無宿命通不能觀見無怪其聞而不信耳張居士今日誕辰非但不傷物命而且捐己財前來設供是不特知報父母恩而且知報佛祖恩報得佛祖恩方報得父母恩也即今祝讚一句作麼生道卓拄杖云年年此日同今日渤海千山莫比倫下座小參維那出問馬祖道即心即佛又道非心非佛畢竟如何即是師震聲一喝那顧左右云大衆見麼昔日馬師今朝重踏師云何得對衆謗毀老僧進云昨日喫虧今日拔本師云且放過一著進云今日東瀛師領衆設齋請和尚齋堂慶讚去也師乃云學道無別只貴心虛心若不虛終無能入譬如車輪若不虛中則不能轉又如鐘磬若不虛中則不能鳴老氏教人虛其心實其腹信知腹之不實皆因心之不虛耳古者道百歲不如我者我當南面而教之一歲勝我者我當北面而事之今時人寧不知人之勝己而己之不若人乎只緣他懷著許多惡知惡見也不是容易得來底教他作麼生拋撇得又緣他一向坐在高高之上受人禮拜受人供養從新下已求人深恐損其威光者兩種但有一種即是一座須彌山一障障住百劫千生永遠絶分東瀛上座久在講下留心經論且為此方欽仰一見山僧輒爾輕信去歲偕弘掀關主走南塔相從依依不捨因而合剎若少若老罔不知所趨向則知虛心不特自己受益且能令衆人大家受益今日又是東瀛領渠合剎前來設供山僧特為拈出虛心兩字以為學道先鋒非徒先鋒則殿後也少兩字不得不見道法界量同太虛衆生智心自小但能不起吾我涅槃法食常飽下座小參云學人無一個不道出了生死無一個不道成佛作祖然而不能出生了死不能成佛作祖者無他祗是無慚愧耳當其聞善言見善行未嘗不內自警覺自悔而自責者然反之幽獨輒置襟影而不問此人似有慚愧實無慚愧至若胸懷瓦礫外假莊嚴皮相者多被瞞過遂謂世人可欺揚揚得意此人無慚愧終無慚愧也更有甚者素履既已不端又為惡毒所中公言飲酒食肉不礙菩提淫殺盜妄無妨般若不特自無慚愧及教他人無慚愧雖彌勒出世又爭奈他何山僧最初得力只在慚愧二字至今也用者慚愧二字今日因壽光禪人領衆設供正搔著癢處特為拈出者兩字供養大衆不論是在家是出家已受具未受具但有者慚愧一念即此一念是出生了死底根源即此一念是成佛作祖底種子若能直下反觀你者慚愧一念從甚麼處起即今知慚識愧者是甚麼人驀地醒得亦無生死可了亦無佛祖可成到者裡并慚愧兩字也不消得下座小參云諸兄弟你各人也曾得個住處麼若未有住處急須覓個住處無量劫來流浪至今不為不久再不趁此覓個住處何有寧息你莫説我五間僧房三間靜室便是我住處彈指光陰百年如同過客者不是你安穩久遠住處你底住處卻也不在遠你但一念未生時不妨步步踏著才涉纖毫思量計較早已瓊崖萬里也昔六祖大師聞人誦金剛至應無所住而生其心便爾大悟後人都會道我但一切處不住著便是我且問你一向在虛空懸著麼莫道我身雖住著心不住著即是心外有身老僧今日卻將有字換了無字且道與祖師當年悟底同耶別耶頃又舉教中舍利弗入城遇月上女向前問言姊甚麼處去月上女答如舍利弗恁麼去舍利弗言我方入城姊方出城何言如我恁麼去女曰諸佛弟子當依何住弗言諸佛弟子依大涅槃而住女言諸佛弟子既依大涅槃而住我亦如舍利弗恁麼去諸兄弟你但識取大涅槃則不特自己得個久遠安穩住處亦知舍利弗與月上女住處然且不識老僧住處要識老僧住處麼從滄海變終不為君通下座小參云釋迦出世談此一心之法達磨西來傳此一心之法一心之法更無別法堪嗟末法中人多不肯信此一心之法往往於心外求法勿道求之不得即令求得也是邪魔種族你但直下信取一心心本無心心本無心故法亦無法畢竟無法亦無不見金剛會上釋迦老子從實供招我於然燈佛所實無有法得阿耨多羅三藐三菩提若有法得阿耨多羅三藐三菩提然燈佛即不與我授記乃至臨末梢頭將從上相承底盡情付與迦葉也不過道個法本法無法無法法亦法今付無法時法法何曾法始終不説自己有法與人亦不曾教人別求甚麼法奈何為佛子而反不信佛言所以德山和尚道腳未跨新羅船早與三十棒了也資福和尚道望見門前剎竿便回去腳跟下好與三十棒睦州和尚才見僧來便道現成公案放汝三十棒你看他古人為人格則不約而同都因你不肯直下信取要向別人口裏討野狐涎喫尋常見汝等踏步向前便識得汝了也大衆汝現今要求個甚麼何不直下信取千了百了何等省事久立珍重下座小參云四生如水泡三界若空花迷時分種種覺後沒些些大衆既是沒些些即今現前拱立僧是僧俗是俗老是老少是少男是男女是女畢竟喚作有喚作無昔日有個恆河上優婆夷來見佛佛問恆河上汝從何來恆河上即白佛言若問化人汝從何來當云何答佛言夫化人者無有往來亦無生滅云何言彼有所從來又問諸法豈不皆如化耶佛言如是如是恆河上言若一切法皆如化者云何應問汝從何來佛言是幻化者不往惡趣不生天上不證涅槃恆河上汝亦爾耶恆河上言我若見身異於幻化方可説言往善惡趣及般涅槃我不見身異於幻化云何説言往善惡趣及大涅槃大衆你看者婦女有甚麼本領向佛前恁地賣弄如今且勿論在家便是出家三五十年頭童齒壑尚自聚首商量恁般便墮惡趣恁般便生天上又恁般經多少劫便成正覺證大涅槃似此見解便與者優婆夷提裙挈履他也不要要識恆河上麼便是佛來他也不管學道人須具者個眼目始得你莫見恁麼説謂是撥有歸無若撥有歸無又墮在豁達空永劫出他地獄不得須是你真實具者眼目真實見得本來真性中畢竟無有惡趣可墮畢竟無有善趣可生畢竟無有涅槃可證然後不妨僧自僧俗自俗老自老少自少男自男女自女隨緣任運任運隨緣徒事空言有損無益下座小參云汝等諸人各各胸前佩一面古鏡輝天映地但能照他不能自照所以他人極深隱極微細處無不纖毫洞見便是虛空還照他骨出只到自己腳跟下便黑漆漆地你莫道我不自照誰復能照殊不知他人之照我更明於我之照人我能照人遂不難論量他長短指摘他瑕疵他人若來指摘我論量我卻生出無限底遮護無限底嗔惱來你但自己略略一照腳跟底乾乾淨淨何怕千人照萬人照縱處在一切人下受一切人欺侮心不負人面無慚色倘或拖泥帶水便沒有半個人照見半夜裏睡醒來恨不得挖個地窖子躲著又爭有間工夫論量他人指摘他人耶今日因八位居士從長安來聚財設供同八里莊僧善前來懇請老僧抱病不能為汝東説西説但將喫緊處拈出願諸大衆各各將平日照人底回轉來自照照來照去不見有所照者亦不見有能照者并者一面古鏡撲地打碎方好來老僧方丈裡吃棒在住永安寺小參云昔日有外道問佛昨日説甚麼法佛言定法又問今日説甚麼法佛言不定法又問昨日定為甚今日不定佛言昨日定今日不定大衆佛是真語者實語者如語者不二語者不妄語者你道因甚麼昨日定今日不定莫是法有兩般麼祗如老僧昨日向汝道祗要汝識取自己且道喚甚麼作自己豎三際橫十方是佛是祖是聖是凡一切含靈蠢動乃至山河大地草木叢林有情無情都盧是你自己畢竟認那一個是你自己若認不得便是業識茫茫直饒認得依然不是大衆歸堂好生體究下座説戒後小參云秋風蕭颯燕子思歸汝等諸人出一保社入一保社可曾得個歸著也無祖道凋零正當秋晚汝等諸人多是四十五十好時光都過去了已是向衰之年當此邊庭秋際觸景傷懷能不凄然若不及早各人覓個歸著一旦大事臨頭黑漫漫地撞在驢胎馬腹又不知多少劫才得出頭好容易剃除鬚髮到此門中又得遭逢大會與諸上善人共聚一處老僧薄德不足以感召諸人想是多生以前曾在那路邊頭搬柴運水供養過你諸人所以相隔萬里不期湊合自去春至今經歷四剎聞風興起者不可數計先後得戒者不下四百人老僧見你許多新大德個個俱有超佛越祖氣概本剎僧主與諸護法好生欽仰老僧亦分餘光老僧每每不惜苦口勸你諸人要你此方無有一人不受佛戒者豈為身披三衣手持一鉢便可了事耶證道歌云不是標形虛事持如來寶杖親蹤迹你諸人既披此衣既持此鉢便須知過去諸佛也如此現在諸佛也如此過去諸佛即是你現在諸人底先模你現在諸人即是過去諸佛底後代歷劫同途後先罔二諸凡先佛所訶而禁絶之者自當身心俱斷斷之又斷以至無斷則本體圓明迥然獨露從上宗乘豈外是耶古人或謂戒急乘緩或謂戒緩乘急殊不知乘是心戒亦是心但了自心自心尚不可得而又何乘何戒何急何緩耶倘當下未便了得第一不得輕略戒法大地人不知戒不信戒不肯受戒者譬如夜半走險十個有五雙墮在坑塹中若既受戒而後輕略不以為意便如白日裏開眼撞入視彼黑暗不見者尤可憐憫梵網經中起心毀犯聖戒者名為佛法中賊末法僧尼喚渠作賊則不任受己實作賊則不知愧阿毗達磨俱舍釋論中佛尚不許犯根本戒人噉一段食踐一腳跟地而況公然安處精舍受檀那供養閻羅大王與汝算帳有日在大衆既受戒者一心堅持未受戒者急須備辦庶幾來南閻浮提走一遭不致折本去也久立珍重都寺玄賦寂亮編書記今何今蟻録
