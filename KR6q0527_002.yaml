body:
  text: 門徒比丘今盧今又重梓上堂端陽上堂恥若問洞山道寒時寒殺熱時熱殺即今不寒不熱如何是及時一句師云角黍沈江底蛟龍不敢吞進云道則恁道學人又不然師云汝又作麼生進云竹葉剝開元是飯沙糖相伴更相宜師云未在更道進云年月雖殊日慶時良伏惟和尚珍重師云放汝三十棒若禮拜乃云五月五打艾虎艾虎鳴木龍舞佳作仁萬物睹道一變至於魯石榴枝續命縷角亢氐庚午土四七三唵蘇嚕喝一喝云急急如律令下座上堂云今日是趙以佐居士追遠道場第二日重請山僧升於此座再為舉揚大衆祗如山僧昨日所云人子追薦父母受薦總在一片實心且道者一片實心落在甚麼處尸棄佛偈云起諸善法本是幻造諸惡業亦是幻身如聚沫心如風幻出無根無實性既無實性故不特身是幻心亦是幻既身心是幻故身心所作善惡諸法皆是幻大衆現前爐煙縹眇幡影䫿颭僧俗交參同臨斯會是幻耶非幻耶若云是幻山僧將甚麼說法你大衆又將甚麼聽法說法聽法歷歷孤明又如何是幻既不是幻又喚甚麼作真實若向者裡具得隻眼真實不可得幻亦不可得非幻非真一道平等而又誰是生誰是死誰是存誰是亡而又誰為追誰為受正當恁麼時一句作麼生道卓拄杖云大衆看趙以佐居士父母及一切有位先亡一時向山僧拄杖頭同證無生法忍了也復卓一卓下座上堂云經已念了趙氏門中久遠先亡俱已度了又教山僧道個甚麼般若經言度盡一切衆生而實無有一衆生得滅度者又蓮華經言如來如實知見三界之相無有生死若退若出亦無在世及滅度者非實非虛非如非異不如三界現於三界惟其現於三界所以必須滅度惟其不如三界所以實無有得滅度者大衆若向個裏如實明見則處處道場日日道場不特趙以佐一生父母宗親一時度盡便是趙以佐纍劫父母宗親以及三界一切有情無情無不一時度盡盡後如何卓拄杖云彌天灑甘雨遍地出黃金下座上堂云昔日紹銑禪師當南公盛化時荊湖衲子奔趨江南恆百里無托宿銑公半五十里為館接待後化去闍維兩眼不壞腸如鐵帶屈折鮮明末法以來人多壞腸只喜聞人惡不喜聞人善只愛己勝人不愛人勝己每每見他長處或緣法稍勝必共搦之擉之不得百計害之所謂仰面吐天徒污己面要求銑公者般肚腸不但退己讓人而且暗相扶助真個千古無兩山僧到者裡來鞍山正是要路南往北來衲子無不極口稱道明如上座殷勤接待歡喜無倦則明如雖未久在山僧會下而其所得固已多矣今日是明如同耿家莊衆等來此設供山僧特為拈出他者一段肚腸使人人似者等肚腸便一絲毫佛法不會山僧必謂是真佛子若其胸懷嫉妒爭弱爭強縱饒你會也會得說也說得共推是阿難陀富樓那山僧正見一條地獄樁子也珍重下座上堂舉雲巖禪師問道吾禪師云大悲千手眼那個是正眼吾云如人半夜背手摸枕子巖云我會也吾云你作麼生會巖云遍身是手眼吾云也只道得入成巖云師兄又作麼生吾云通身是手眼大衆且看通身是與遍身是相隔多少你若向者裡緇素得出不特與道吾雲巖兩尊宿同出手眼便能與大悲菩薩同其千手千眼照徹三千大千應用無拘無礙今日遠來衆士俱是喪明底千辛萬苦募化衆緣到此辦供與諸大衆同種般若善根山僧到者裏已將兩月猶有咫尺而不能相見者衆士乃從二百里三百里扶杖而來即此一來便是渠心地中法眼放大光明了也大衆若明得心地法眼便能不離父母所生之眼而見乎道亦能不假父母所生之眼而見乎道不然莫道是兩個眼便與你一千個眼未免對面隔千山在上堂云盡大地學人蹉處只知進前不知退後學人之求道與世人之求名求利雖所趨不同然其知進而不知退則一也別教中尚道絶學無憂又道為學日益為道日損損之又損以至於無為所以龐居士道但願空諸所有慎勿實諸所無歷代諸祖見你不肯休歇沒奈何用惡辣手段或將爾雙腳打折或向你頂門上心窩裡狠狠一錘教你命根斷卻然後緩緩蘇醒過來可憐見鼻孔依然搭著上唇舉楞嚴經云一人發真歸源十方虛空悉皆消殞五祖禪師卻道一人發真歸源十方虛空觸著磕著正與黃面老子同出隻手接引者裡又不然盡大地人發真歸源十方虛空一切如舊你若向接引處識得方識得他五祖識得五祖方才會得楞嚴經然後不妨進前也得退後也得喝一喝云畢竟如何是發真歸源𠰚待食過小馬頭齊來與你商量下座上堂舉五祖道說心說性即是惡口大衆且道心性有甚麼過山僧偶記得本空偈云心是性體性是心用心性一如誰別誰共妄外迷源祗者難洞古今凡聖如幻如夢佛鑒別云心本非心性本非性心性兩亡誰少誰剩老倒本空炙艾求病妄外迷源孤負凡聖山僧亦有一偈心是糞帚性是溺桶誰家屋無拈來何用兩個老漢一納一送蝦跳不出斗鱉走還在甕大衆但將者三偈擘得開捏得合便任爾說心說性也得不說心不說性也得不然總是惡口一喝下座上堂云為人須為徹殺人須見血大道陵夷於今為極仔細思量不關學人之事都緣主法者只知提獎嬰兒撫憐幼子不能驅耕夫之牛奪饑人之食又爭怪得罄光監院是牛莊舊主人一向蹲在蝦蟆洞裏前歲不知聽何人鼓惑走普濟問山僧要南方蜜是子吃山僧與他一個粟棘蓬儘力吞不下如是一年每隨衆入室輒惶懼不安一日在南塔徑來辭云今後更不信老漢胡亂也可惜當時輕易放過以致惹起一番絡索帶纍山僧來者裡出乖露醜今日又領他合剎眷屬與莊上衆檀前來辦供要結個甚麼般若緣是不特帶纍山僧又帶纍了許多眷屬許多檀那山僧不免借公報私要當大衆狠狠與他一頓衆中莫有同山僧出一隻手底麼維那出進語師便棒那云語尚未了和尚為甚便打師又連棒下座上堂云今日是徐居士設供請山僧舉揚此事此事的實不費力然不是費盡力後斷斷不知其不費力何故世間惟此一事更無有過於此事者即費力猶恐不能搆何況不費力所以古人一恁教你儘力費將去費到無力可費時築著磕著方知道從前費了底總沒交涉雪峰道汝等諸人終日在飯籮邊伸手向人要飯喫終日在大海邊伸手向人要水喫玄沙又道終日在飯籮裏餓殺終日在大海裏渴殺雲門又道通身俱是飯通身俱是水古人恁地剖肝割膽血滴滴為你你為甚不領你但識得通身是飯通身是水莫道不費力祗者要費底是個甚麼卓拄杖云五月將終天尚冷鴈群飛去又飛回下座上堂云普天匝地亙古亙今橫遍豎窮無餘無缺所以盡十方世界一切衆生無不於中全體顯露全體受用祗為你不識不知顯露者卻不顯露受用者卻不受用反疑我佛如來別有長處假使我佛果別有纖毫長處則是我佛語言不實誑我兒孫非但誑我兒孫亦且誑他父王不見寶積部中淨飯王白佛言若一切法皆佛法者一切衆生亦皆是佛佛言若不顛倒見衆生者即是其佛大王所言佛者即如實見衆生也如實見衆生者即是見實際大衆畢竟喚甚麼作實際耳非實際將甚麼聽法目非實際將甚麼見色鼻非實際將甚麼嗅香舌非實際將甚麼辨味身非實際將甚麼覺觸意非實際將甚麼分別既一一都歸實際者實際又向甚麼處歸著大衆你若覓歸著處不可得則不特六根六塵十二處十八界以至二十五有一切了不可得并實際也不可得不可得亦不可得然後蓋州長老不妨頻頻勸施接引大衆不妨頻頻受供薔薇香豔石榴紅夏至寒衣且莫送擊拂子下座上堂喚大衆云汝等諸人從本是佛即至於今歷百千萬億劫並未曾有分毫移動寶積經言如來住彼如如法中一切衆生亦復如是初不移動如衆生如即如來如如來如即衆生如衆生如來無二無別大衆既是無二無別為甚又分如來與衆生衆生者祗為不識如來經中分明向汝道如來者即諸法如義又維摩詰語彌勒大士云一切衆生皆如也一切法亦如也衆聖賢亦如也至於彌勒亦如也如則無佛如則無衆生既無佛無衆生并如之一字已是多底又不見文殊說般若經佛告文殊汝言我是如來亦謂我為如來乎文殊言不也世尊我不謂如來為如來耶無有如相可名為如亦無如來智能知於如所以南泉老人道喚作如如早已變了也大衆既不許喚作如如畢竟喚作甚麼喝一喝云析木城中琉璃瓦五采間錯光照夜下座上堂云山僧到者裡兩月有餘白衣諸禪終日在座下聽山僧搖唇鼓舌今日重新設供請山僧舉揚呵呵呵會也麼後面路前面河饑便喫脹便屙豺狼獰似犬鴻鴈大如鵝囉囉哩哩囉囉今年禾麥熟更比去年多卓拄杖下座上堂維那問和尚有言拚得豪傑做得豪傑做得且置作麼生說拚底道理師卓拄杖一下進云一種沒絃琴惟師彈得妙請和尚再按指師便打進云盞子落地碟子七片八片師云今日正當六月六進云左之左之右之右之遂禮拜師乃云古者道今古應無墜分明在目前又道大道只在目前要且目前難睹大衆祗如現今目前座上底是老僧兩邊底是大衆設供底是呂居士趙居士暨衆檀那飄底是幡燒底是香大道畢竟在甚麼處若言者總是有甚難睹若言總不是為甚道只在目前頃舉真淨禪師室中問一僧云了也未僧云未了淨云食粥了也未僧云食了也淨云又道未了又問外面甚麼聲僧云雨聲淨云又道未了又問現前是甚麼僧云屏風淨云又道未了又問會麼僧云不會復示偈云隨緣事事了日用無缺少一切但尋常自然不顛倒雖然如是你若作日用尋常會便拖帶真淨老漢入拔舌地獄去也既不許日用尋常會又作麼生會卓拄杖云晴天好晒衣下座上堂云今日是趙氏三昆玉領渠合家同朱居士設齊與大衆送行善迎不如善送好頭須得好尾來時虎笑風生去時龍騰雲至等閒豎拂拈槌惹得如狂似醉謾誇頑石點頭浪說天花亂墜但使黃葉止啼何妨把賤作貴三門佛殿交參露柱燈籠易位金剛寶劍倚天外道邪魔膽碎北俱盧洲鳴鐘西瞿耶尼犬吠震動帝釋天宮東海鯉魚鼎沸且喜浪靜波平依舊青山緑水臨行一句真言只在遼陽新寺卓拄杖便下座上堂云山僧與爾者方諸檀及各剎諸禪原從多劫中同事諸佛同種般若而來今日到者裡正是他鄉遇舊知不是新相識正團圞得好不期又有遼陽新寺之請不得已要與諸檀及諸禪分手不覺凄然古云人非草木安能長聚而不離若能內不著心外不著法心法雙亡內外如如則諸檀即是諸禪諸禪即是山僧聚無可聚離無可離然後不妨山僧自山僧諸禪自諸禪諸檀自諸檀有時離而復聚有時聚而後離所謂動若行雲止猶谷神豈有心於彼此那有像於去來正當恁麼時一句作麼生道一片野雲留不住夜來依舊月團圓下座上堂卓拄杖云大衆見麼諸佛不曾出世祖師不曾西來只是者個至於諸佛手授授底也只是者個諸祖相傳傳底也只是者個最是渾成不假雕琢山僧當年將為有多少奇特頓捨世緣追尋求訪及乎得來也不過就是者個今日到者裡徐居士姜居士羅居士領衆善信強要山僧人天衆前拈出者個山僧不敢囊藏被蓋盡數傾向你諸人面前了也昔日善財入彌勒樓閣猶資斂念普眼入普賢妙境亦借威神大衆現前不用商量不費周折直截便見撩起便行一處通千處萬處透脫一處明千光萬光普照然後不妨隨時喫飯穿衣屙屎撒尿與諸佛祖把手同行如其未然山僧不免為汝重加注解黃瓜長似臂茄子大如拳下座上堂云真體無體不許向無體中覓實相無相不許向無相中求蓮華經云諸法從本來常自寂滅相但能於相無相於體無體直下纖塵不立等