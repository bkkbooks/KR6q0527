生是出世間之孝祗如睦州尊宿織屨養親喚作出世之孝麼且喜沒交涉又如目犍連尊者得大解脫運大神通手擎金錫掌托龍盂詣地獄門卓然尋省見其慈母悲泣無量喚作出世之孝麼且喜沒交涉至如我大覺世尊十九出家在雪山六年行盡苦行後於金剛座上睹星悟道卻回本國為父王說法復上忉利為母說法喚作出世間之孝麼者也不過為人天立個標榜我佛之孝正不在是函可從二十九歲剃除鬚髮比時嚴父先逝慈母在堂割愛棄恩從師度嶺至今一十五年不幸慈母棄世姊妹兄弟前後遇難死亡殆盡惟餘函可孤身放逐萬里因循懈怠道力不加中夜思量慚愧無地世間之孝全缺出世之孝罔聞真世出世間一大罪人也今日適當母難之辰四方僧善齊集座下海州諸檀那復不辭遠涉欲為稱觴無乃重老僧之罪而益老僧之慚耶雖然賊來須打客來須待山僧者裡既無可待亦不須打只有一則陳腐公案不免拈出昔溈山和尚示衆云老僧百年後向山前檀越家作一頭水牯牛脅下書一行字云溈山僧某甲爾時喚作水牯牛又是溈山僧喚作溈山僧又是水牯牛畢竟喚作甚麼汝等若向個裡下得一語非但可為老僧消罪釋慚世出世間兩俱無憾亦可續長佛祖慧命為一切人天增延福壽大衆試出來道看衆下語不契師云何不道待老漢作牛時方道隨舉手云雪地嚴寒敬謝大衆衆禮拜下座上堂維那問大悲懺言千佛出世不通懺悔畢竟如何懺得師云門外千山盡白頭進云勿輕小罪以為無殃如何得無殃師云點點滴滴進云祗如現前新舊大德逐日禮拜功德回向阿誰師以拂打圓相云會麼進云恁麼則趙居士全家迪吉也師云也不在他一人乃云教中道聞一佛名恭敬禮拜能滅無量罪集無量福何況三千諸佛名同時得聞同時禮拜則又何福不集何罪不消然汝等止知諸佛名且不知諸佛出身昔有僧問雲門如何是諸佛出身處雲門道東山水上行大衆若向雲門句裏會得不特諸佛出身便識得諸佛歸著處若識得諸佛歸著處便是汝等諸人放身捨命處既識汝諸人放身捨命處傅大士所謂夜夜抱佛眠朝朝還共起更何必焚香展卷腦門著地而後謂之禮懺耶雖然到者裡一拜也少他不得今日趙居士為汝等三番設供請老僧證明功德圓滿且道圓滿一句作麼生道卓拄杖云但聞是法者悉皆成佛道下座上堂云世間聚散如水上萍如風中葉本自無定不見昨日戒壇中幾盈千衆今日忽然散去大半且道去底是留底是論跡則有去來之異論心實無聚散之殊大衆你但識取無殊底則留亦得去亦得諸佛諸祖一切大善知識盡隨你腳跟轉不然雖終日在老僧座下未免猶隔津在且道如何是不隔底句良久云今日耿家屯有齊下座上堂云就路還家易離波覓水難所以道欲識諸佛師向衆生無明心內識取欲識常住不凋性向萬物遷變中識取識得便能拈一莖草現丈六金身若不識縱有丈六金身卻被一莖草蓋覆復舉歸宗門下有一僧半夜大叫云我大悟也我大悟也次日歸宗上堂喚夜間大叫僧出云你見個甚麼道理便說大悟者僧道師姑原是女人做老僧在俗聞舉不覺通身輕快今日因諸子遠來不免將真正經驗底藥頭拈出只用一味不疑湯送下大衆倘信不及待老僧看病回來再為你添個引子下座上堂云衆生無邊誓願度煩惱無盡誓願斷法門無量誓願學佛道無上誓願成此是四弘誓願三世諸佛同此發願一切聖賢依此發願慈航今日逐句要換一字衆生無邊誓無度煩腦無盡誓無斷法門無量誓無學佛道無上誓無成大衆你道是違背佛旨不是違背佛旨喝一喝云欲得不招無間業莫謗如來正法輪上堂云終年辛苦枉馳求不到盡頭誰肯休今朝已到盡頭也為問諸人休不休世間人只為名利兩字從年頭到年尾休不得出家兒又添了生死兩字也從年頭到年尾休不得昔日也有個充發長老喚作道楷示衆道臘月三十日以前則不問正當臘月三十日佛也救你不得法也救你不得祖師也救你不得天下老和尚也救你不得老僧也救你不得閻老子也救你不得直須盡卻今時始得大衆你道今時作麼生盡縱饒你將名利兩字與生死兩字及平時種種馳求如許情念盡數拋卻也還有盡不了底如何是盡不了底試看和風吹凍解長河依舊向西流下座元旦上堂舉香云大衆著眼者瓣香了無奇異其力甚大其用甚廣其利甚普在天地則發育萬物蒸為太平景色在人身則調和四大薰成菩提種子在老僧手裡上祝無疆聖壽下祝同樂民生和氣充遍於域中恩光遐被於塞外再祝護法檀那現前七衆元日設供錦州劉大人合家應時納祐慶無不宜就座白椎竟書記問風晴日朗歲色增新一花燦爛則不問萬象含輝事若何師云爆竹聲中催臘盡梅花夢裡送春來進云四海盡承春氣力何人不在化光中師云莫嫌寒塞苦歲歲見豐登進云昨晚爆竹說法與今日和尚說法是同是別師云今年更勝去年進云恁麼則仁風永扇慧日長明師云天下人安我亦安進云昔日世尊拈花迦葉微笑未審慈航如何舉示師一喝進云人天欣仰則不無學人意不如是師云你又作麼生進云三韓冰尚結五國地猶寒師云南無三滿哆進云伏惟和尚萬安便禮拜師云打頭一棒也少你不得半文問陳年事已過新年事若何師云泥牛貪緑草石女舞春風進云未審新年陳年如何分別師以拂打圓相進云大衆仰瞻一句如何道師豎拂文禮拜師云便恁麼去也少一棒不得進云若人散亂心入於塔廟中一稱南無佛皆已成佛道如何是成佛底事師云粗茶淡飯度年光文禮拜云謝和尚指示師乃云且喜大衆人人都增得一歲殊不知大衆人人都減卻一歲增固可喜減亦可惜惟有者一頭水牯牛他也無增他也無減不知寒來暑往不知送舊迎新不受三界拘牽不隨二氣遷變自繇自在獨脫獨超大衆曾識者一頭水牯牛麼若未識得隨老僧到方丈裡再加爾些新鮮草料下座上堂師舉趙州和尚云我在南方行腳除二時粥飯是雜用心若據老僧看來刻刻都是雜用心莫道如世間人求名求色求財種種是雜用心又莫道習學一切工藝博探一切俗典是雜用心便是終日禮拜終日持念也是雜用心通一切經明一切論透一切公案也是雜用心靜坐習定也是雜用心尋師訪友也是雜用心參禪問道也是雜用心斷煩惱向真如也是雜用心了生死證涅槃也是雜用心汝等即今站立傾聽老僧即今信口胡說也是雜用心直饒爾百不思百不想寂寂空空如枯木土石也是雜用心爾才怕雜用心也是雜用心然則畢竟作麼生方得不雜用心聻喝一喝歷歷彔彔七人八穀下座空和尚誕日師至筵前拈香禮拜起顧衆云古人云東弗於逮道一句南贍部洲也聞西瞿耶尼道一句比鬱單越也聞天上道一句人間也聞何故心心相知眼眼相照祗如空老人現住福州不孝子函可卻向瀋陽南塔祝壽相去一萬餘里且道老人還聞也無若道得聞老人現在彼處說法者裏為甚不聞以拂子擊案云聞麼汝若向個裏得聞不特老人福州說法得聞即今釋迦老子現在靈山說法汝也得聞又不特靈山說法得聞即今壽筵上茶碗果碟香爐燭臺與兩邊土床木柱同時說法汝盡得聞大衆莫見恁麼說便思量道此是無言無說也無聽無聞也又道無言無說是真言說無聽無聞是真聽聞也便又引金剛經道無法可說是名說法又引楞嚴經道反聞聞自性且道自性作麼生聞爾又不妨廣去搜尋證見道釋迦掩室於摩竭淨名杜口於毗耶須菩提唱無說以顯道釋梵絶聽而獻花者般說話不道不是任爾將三藏十二部一齊翻將出來說到來年三月十七不特聞不得老人福州說法現今山僧恁地鼓兩片皮爾也直得有眼如盲有耳如聾不見洞山和尚去參溈山問南陽國師無情說法話溈山道闍黎記得麼洞云記得溈云試舉一遍看洞遂舉僧問如何是古佛心國師云墻壁瓦礫是僧云墻壁瓦礫豈不是無情國師云是僧云還解說法否國師云常說熾然說無間歇僧云某甲為甚不聞國師云汝自不聞不可妨他聞者也僧云未審甚麼人得聞國師云諸聖得聞僧云和尚還聞不國師云我不聞僧云和尚既不聞爭知無情說法國師云賴我不聞我若聞即齊於諸聖汝即不聞我說法也僧云恁麼則衆生無分去也國師云我為衆生說不為諸聖說僧云衆生聞後如何國師云即非衆生僧云無情說法據何典教國師云爍然言不該典非君子之所談汝豈不見華嚴經云剎說衆生說三世一切說洞山舉畢溈山道我者裡亦有只是罕遇其人洞云某甲未明乞師指示溈豎起拂子云會麼洞云不會請師說溈云父母所生口終不為子說洞云還有與師同時慕道底麼溈云此去豐陵攸縣石室相連有雲岩道人若見必為子重洞山遂去見雲岩舉前因緣了便問無情說法甚麼人得聞岩云無情得聞洞云和尚聞不岩云我若聞汝即不聞吾說法也洞云某甲為甚不聞岩豎起拂子云還聞麼洞云不聞岩云我說法汝尚不聞豈況無情說法耶洞云無情說法該何典教岩云豈不見彌陀經云水鳥樹林悉皆念佛念法洞山於此省得大衆且道洞山因甚麼便省得復以拂子擊案一下云聞麼大衆但向者裏得聞便知無情說法與有情說法無二無別便知洞山雲岩溈山南陽國師紛紛說法與者壽筵上茶碗果碟香爐燭臺兩邊土床木柱同時說法無二無別便知山僧現今在南塔鼓兩片皮與靈山會上以及四大部洲天上人間同時說法無二無別復擊一擊云聞麼聞麼聞得底不妨出來證明湧光出云知恩者少負恩者多師震聲一喝云聞得也是三十棒聞不得也是三十棒還有六十棒三十棒寄與福州老人三十棒山僧不免自領將去歸方丈端陽上堂僧問屈子沈江即不問祗如邇日大地忠魂如何濟度師云南無觀世音菩薩進云爭奈空言不當喫何師舉拂子云者個是空言不是空言進云者個是拂子畢竟忠魂如何濟度師喝一喝云汝不識忠魂乃云欲識佛性義當觀時節因緣時節若至其理自彰請問諸善知識喚甚麼作時節莫道是端陽時節麼莫道是上堂說法時節麼祗如山僧上堂大衆便集山僧下座大衆便散每日如此上來下去有甚了期諸善知識須知有者個時節始得者個時節不用別尋是爾諸人各各腳跟下具有者個時節上至諸佛諸祖下及地獄餓鬼畜生莫不盡同者個時節祗是爾諸人不識者個時節便都蹉過者個時節要識者個時節麼釋迦登座文殊白椎云諦觀法王法法王法如是正是者個時節罔明彈指女子出定正是者個時節殃屈到産難人家道我從入聖賢法來不曾殺人正是者個時節迦葉喚阿難難應諾正是者個時節乃至馬祖上堂百丈捲席與再參一喝趙州喫茶去我在青州做一領布衫重七斤雪峰望州亭與汝相見了也臨濟入門便喝德山入門便棒香嚴上樹玄沙三種病人睦州現成公案放汝三十棒俱胝一指鳥巢吹布毛禾山打鼓歸宗斬蛇雲門乾矢橛無不盡是者個時節據實而論諸佛諸祖一切經一切論一切機緣無不盡是者個時節祗如適才答他道南無觀世音菩薩也只是者個時節若識得者個時節非惟自度亦能度人豈特大地忠魂從無始劫直至盡未來際一切有情無情無不同時濟度周畢了也大衆還識得者個時節麼如未識得山僧不惜眉毛重為汝下個注腳以拂子書空作字云五月五日午時書赤口白舌悉消除下座都寺寂亮編書記今蟻今何録
